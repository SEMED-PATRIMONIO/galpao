# Definição de zonas para limitação de conexões (deve estar no topo)
limit_conn_zone $binary_remote_addr zone=limit_pais:10m;

# 1. Cadastro de Alunos (Porta 3004)
server {
    listen 80;
    server_name aeecadastro.paiva.api.br; # Certifique-se que o domínio está correto aqui

    root /var/www/aee-cadastro/frontend/dist;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location /api/ {
        proxy_pass http://localhost:3004;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }
}

# 2. Painel Gerencial (Porta 3005)
server {
    listen 80;
    server_name aeepainel.paiva.api.br;

    root /var/www/aee-cadastro/frontend/dist; # Pasta que acabamos de criar
    index index.html;

    location / {
        # Isso tenta abrir o arquivo. Se não achar, manda pro index.html (React Router)
        try_files $uri $uri/ /index.html;
    }

    location /api/ {
        # Somente o que for /api/ vai para o servidor Node
        proxy_pass http://localhost:3005;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}

# 3. Portal dos Pais (Porta 3011) - Com restrições
server {
    listen 80;
    server_name aee.paiva.api.br;

    # Limite de 20 conexões simultâneas
    limit_conn limit_pais 20;

    # Timeouts de Inatividade e Duração
    # Encerra se ficar inativo por 3 minutos (180s)
    keepalive_timeout 180s;
    
    # Limita a duração máxima da requisição/conexão a 5 minutos (300s)
    proxy_read_timeout 300s;
    proxy_connect_timeout 300s;
    proxy_send_timeout 300s;

    root /var/www/aee-cadastro/frontend/dist; # Pasta que acabamos de criar
    index index.html;

    location / {
        # Isso tenta abrir o arquivo. Se não achar, manda pro index.html (React Router)
        try_files $uri $uri/ /index.html;
    }

    location /api/ {
        # Somente o que for /api/ vai para o servidor Node
        proxy_pass http://localhost:3011;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}

