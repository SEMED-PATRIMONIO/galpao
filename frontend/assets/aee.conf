# Definição de zonas para limitação de conexões (deve estar no topo)
limit_conn_zone $binary_remote_addr zone=limit_pais:10m;

# 1. Cadastro de Alunos (Porta 3004)
server {
    listen 80;
    server_name aeecadastro.paiva.api.br;

    location / {
        proxy_pass http://localhost:3004;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
    }
}

# 2. Painel Gerencial (Porta 3005)
server {
    listen 80;
    server_name aeepainel.paiva.api.br;

    location / {
        proxy_pass http://localhost:3005;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
