<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro AEE - Gestão Multidisciplinar</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <style>
        :root {
            --primary-blue: #004587;
            --glass-bg: rgba(255, 255, 255, 0.75);
            --glass-border: rgba(255, 255, 255, 0.3);
        }

        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: linear-gradient(135deg, #004587 0%, #00a8e8 100%);
            background-attachment: fixed;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            min-height: 100vh;
        }

        /* Container Vitrificado */
        .glass-card {
            background: var(--glass-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
            border-radius: 30px;
            width: 100%;
            max-width: 450px;
            padding: 30px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.2);
            margin: auto;
        }

        .header { text-align: center; margin-bottom: 30px; }
        .header i { font-size: 3rem; color: var(--primary-blue); }
        .header h1 { font-size: 1.5rem; color: var(--primary-blue); margin: 10px 0 5px; }
        .header p { font-size: 0.9rem; color: #555; }

        /* Barra de Progresso Gamificada */
        .progress-bar {
            display: flex;
            justify-content: space-between;
            margin-bottom: 30px;
            position: relative;
        }
        .step-dot {
            width: 35px;
            height: 35px;
            background: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            color: var(--primary-blue);
            z-index: 2;
            transition: 0.3s;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }
        .step-dot.active { background: var(--primary-blue); color: white; transform: scale(1.2); }
        .progress-line {
            position: absolute;
            top: 17px;
            left: 0;
            width: 100%;
            height: 3px;
            background: rgba(0,0,0,0.1);
            z-index: 1;
        }

        .form-group { margin-bottom: 20px; }
        label { display: block; font-weight: 600; color: var(--primary-blue); margin-bottom: 8px; font-size: 0.95rem; }
        input, select {
            width: 100%;
            padding: 14px;
            border-radius: 15px;
            border: 1px solid rgba(0,0,0,0.1);
            background: rgba(255,255,255,0.8);
            box-sizing: border-box;
            font-size: 1rem;
        }

        /* Grid de Especialidades */
        .spec-grid { display: grid; grid-template-columns: 1fr; gap: 10px; }
        .spec-item {
            background: rgba(255,255,255,0.5);
            padding: 15px;
            border-radius: 15px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border: 1px solid transparent;
            transition: 0.3s;
        }
        .spec-item.selected { border-color: var(--primary-blue); background: white; }
        .spec-item input[type="number"] { width: 70px; padding: 8px; margin-left: 10px; }

        .btn-next {
            background: var(--primary-blue);
            color: white;
            border: none;
            padding: 18px;
            width: 100%;
            border-radius: 15px;
            font-weight: bold;
            font-size: 1.1rem;
            cursor: pointer;
            margin-top: 20px;
            transition: transform 0.2s;
        }
        .btn-next:active { transform: scale(0.98); }
        .hidden { display: none; }

        #success-modal {
            text-align: center;
            padding: 20px;
        }
        #success-modal i { font-size: 5rem; color: #28a745; }
        select {
            width: 100%;
            padding: 14px;
            border-radius: 15px;
            border: 1px solid rgba(0,0,0,0.1);
            background: rgba(255,255,255,0.8);
            font-size: 1rem;
            color: var(--primary-blue);
            appearance: none; /* Remove a seta padrão do sistema para usarmos a nossa */
            background-image: url("data:image/svg+xml;charset=UTF-8,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%23004587' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'%3e%3cpolyline points='6 9 12 15 18 9'%3e%3c/polyline%3e%3c/svg%3e");
            background-repeat: no-repeat;
            background-position: right 15px center;
            background-size: 18px;
            cursor: pointer;
        }
        select option {
            background: white;
            color: #333;
        }
    </style>
</head>
<body>

<div class="glass-card">
    <div class="header">
        <i class="bi bi-person-plus-fill"></i>
        <h1>Novo Aluno AEE</h1>
        <p>Preencha os dados do estudante</p>
    </div>

    <div class="progress-bar">
        <div class="progress-line"></div>
        <div class="step-dot active" id="dot-1">1</div>
        <div class="step-dot" id="dot-2">2</div>
        <div class="step-dot" id="dot-3">3</div>
    </div>

    <div id="step-1">
        <div class="form-group">
            <label>Nome Completo do Aluno</label>
            <input type="text" id="nome" placeholder="Ex: João da Silva">
        </div>
        <div class="form-group">
            <label>RA (Registro Acadêmico)</label>
            <input type="number" id="ra" placeholder="Apenas números">
        </div>
        <div class="form-group">
            <label>Escola de Origem</label>
            <select id="escola">
                <option value="">Selecione a unidade...</option>
                <option>CAEEQ</option>
                <option>CEADQ</option>
                <option>E M ALBERTO PIRRO</opt/ion>
                <option>E M ALLAN KARDEC</option>
                <option>E M ANNA PEROBELLI</option>
                <option>E M CARLOS PEREIRA NETO</option>
                <option>E M CLEDON CAVALCANTE</option>
                <option>E M DIVA TEIXEIRA</option>
                <option>E M DR FRANCISCO M BRANDAO</option>
                <option>E M ELOI TEIXEIRA</option>
                <option>E M GILVANEI PEREIRA</option>
                <option>E M JOAQUIM DE FREITAS</option>
                <option>E M JOSE ANASTACIO</option>
                <option>E M JOSE BITTENCOURT</option>
                <option>E M JOSE DE ANCHIETA</option>
                <option>E M LEOPOLDO MACHADO</option>
                <option>E M LUIZ DE CAMOES</option>
                <option>E M MARIA C P XANCHAO</option>
                <option>E M METODISTA</option>
                <option>E M MONTEIRO LOBATO</option>
                <option>E M NELSON CARNEIRO</option>
                <option>E M OSCAR WEINSCHENCK</option>
                <option>E M PASTOR ARSENIO</option>
                <option>E M PAULO FREIRE</option>
                <option>E M SANTO EXPEDITO</option>
                <option>E M SAO JOSE</option>
                <option>E M SCINTILLA EXEL</option>
                <option>E M SEBASTIAO VERISSIMO</option>
                <option>E M TIRADENTES</option>
                <option>E M UBIRAJARA FERREIRA</option>
                <option>E M VALCIRA SANTANA</option>
                <option>E M WALDICK PEREIRA</option>
                <option>E M WASHINGTON MANOEL</option> 
            </select>
        </div>
        <button class="btn-next" onclick="nextStep(2)">Próximo <i class="bi bi-arrow-right"></i></button>
    </div>

    <div id="step-2" class="hidden">
        <label>Selecione as Especialidades e Sessões/Mês</label>
        <div class="spec-grid">
            <div class="spec-item">
                <span><i class="bi bi-activity"></i> Fisioterapia</span>
                <input type="number" class="carga" data-spec="Fisioterapia" placeholder="0">
            </div>
            <div class="spec-item">
                <span><i class="bi bi-headset"></i> Fonoaudiologia</span>
                <input type="number" class="carga" data-spec="Fonoaudiologia" placeholder="0">
            </div>
            <div class="spec-item">
                <span><i class="bi bi-brain"></i> Psicologia</span>
                <input type="number" class="carga" data-spec="Psicologia" placeholder="0">
            </div>
            <div class="spec-item">
                <span><i class="bi bi-puzzle"></i> Terapia Ocupacional</span>
                <input type="number" class="carga" data-spec="TerapiaOcupacional" placeholder="0">
            </div>
        </div>
        <button class="btn-next" onclick="nextStep(3)">Revisar e Salvar <i class="bi bi-check-circle"></i></button>
    </div>

    <div id="step-3" class="hidden" id="success-modal">
        <div style="text-align: center;">
            <i class="bi bi-cloud-check-fill" style="font-size: 4rem; color: var(--primary-blue);"></i>
            <h3>Tudo pronto!</h3>
            <p>Confirme os dados para finalizar o registro no sistema.</p>
        </div>
        <button class="btn-next" onclick="salvarAluno()">Finalizar Cadastro</button>
    </div>
</div>

<script>
    function nextStep(n) {
        if(n === 2) {
            if(!document.getElementById('nome').value || !document.getElementById('ra').value) {
                alert("Por favor, preencha os dados básicos.");
                return;
            }
        }
        document.querySelectorAll('[id^="step-"]').forEach(s => s.classList.add('hidden'));
        document.querySelectorAll('.step-dot').forEach(d => d.classList.remove('active'));
        
        document.getElementById('step-' + n).classList.remove('hidden');
        for(let i=1; i<=n; i++) document.getElementById('dot-'+i).classList.add('active');
    }

    async function salvarAluno() {
        const cargas = document.querySelectorAll('.carga');
        const especialidadesAtivas = [];
        const cargaHoraria = {};

        cargas.forEach(c => {
            const qtd = parseInt(c.value);
            if(qtd > 0) {
                especialidadesAtivas.push(c.dataset.spec);
                cargaHoraria[c.dataset.spec] = qtd;
            }
        });

        const payload = {
            nome: document.getElementById('nome').value,
            ra: document.getElementById('ra').value,
            escola: document.getElementById('escola').value,
            especialidades: especialidadesAtivas,
            carga: cargaHoraria
        };

        try {
            const response = await fetch('/api/alunos', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });

            if(response.ok) {
                alert("🎉 Aluno cadastrado com sucesso!");
                location.reload();
            }
        } catch (err) {
            alert("Erro ao conectar com o servidor.");
        }
    }
</script>
</body>
</html>
