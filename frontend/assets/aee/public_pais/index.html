<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal AEE - Família</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <style>
        :root { --primary-blue: #004587; --glass: rgba(255, 255, 255, 0.8); }
        body { 
            font-family: 'Segoe UI', sans-serif; 
            background: linear-gradient(180deg, #004587 0%, #f0f8ff 100%);
            margin: 0; padding: 0; min-height: 100vh; color: #333;
        }

        .glass-container {
            background: var(--glass);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border-radius: 30px;
            margin: 15px;
            padding: 25px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.1);
        }

        /* LOGIN E TROCA DE PIN */
        .full-screen-center { height: 100vh; display: flex; align-items: center; justify-content: center; position: fixed; width: 100%; top: 0; left: 0; z-index: 999; background: #004587; }
        
        .pin-input {
            width: 50px; height: 60px; font-size: 2rem; text-align: center;
            border-radius: 12px; border: 2px solid #ddd; margin: 0 5px;
            background: white;
        }

        /* DASHBOARD PAIS */
        .header-perfil { text-align: center; margin-bottom: 20px; }
        .avatar { width: 80px; height: 80px; background: white; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 10px; font-size: 2rem; color: var(--primary-blue); }

        .card-atendimento {
            background: white; border-radius: 20px; padding: 15px; margin-bottom: 15px;
            border-left: 6px solid #00a8e8; display: flex; align-items: center; gap: 15px;
        }

        /* BARRA DE NAVEGAÇÃO INFERIOR */
        .bottom-nav {
            position: fixed; bottom: 0; width: 100%; background: white;
            display: flex; justify-content: space-around; padding: 15px 0;
            border-top-left-radius: 25px; border-top-right-radius: 25px;
            box-shadow: 0 -5px 20px rgba(0,0,0,0.05);
        }
        .nav-item { text-align: center; color: #888; font-size: 0.8rem; cursor: pointer; }
        .nav-item.active { color: var(--primary-blue); font-weight: bold; }
        .nav-item i { font-size: 1.5rem; display: block; }

        .btn-acao { background: var(--primary-blue); color: white; border: none; border-radius: 15px; padding: 15px; width: 100%; font-weight: bold; }
        .hidden { display: none; }
        .piscante { animation: opacity 1s infinite; color: red; font-size: 0.8rem; }
        @keyframes opacity { 0% { opacity: 1; } 50% { opacity: 0.4; } 100% { opacity: 1; } }
    </style>
</head>
<body>

<div id="tela-login" class="full-screen-center">
    <div class="glass-container" style="max-width: 320px;">
        <div style="text-align: center; margin-bottom: 20px;">
            <i class="bi bi-shield-lock-fill" style="font-size: 3rem; color: #004587;"></i>
            <h2 style="margin: 10px 0;">Acesso Pais</h2>
        </div>
        <input type="text" id="login-usuario" placeholder="Nome de usuário" class="btn-acao" style="background: white; color: #333; border: 1px solid #ddd; margin-bottom: 15px;">
        <input type="password" id="login-pin" maxlength="5" placeholder="PIN de 5 dígitos" class="btn-acao" style="background: white; color: #333; border: 1px solid #ddd; text-align: center; font-size: 1.5rem; letter-spacing: 10px;">
        <button class="btn-acao" onclick="fazerLogin()">Entrar no Portal</button>
    </div>
</div>

<div id="tela-troca-pin" class="full-screen-center hidden" style="background: #f0f8ff;">
    <div class="glass-container" style="max-width: 350px;">
        <h3 style="color: var(--primary-blue); text-align: center;">Segurança Necessária</h3>
        <p style="text-align: center; font-size: 0.9rem;">Por sua segurança, escolha um novo PIN numérico de 5 dígitos que só você saiba.</p>
        <div style="display: flex; justify-content: center; margin: 20px 0;">
            <input type="password" id="novo-pin" maxlength="5" class="pin-input" style="width: 150px;">
        </div>
        <p class="piscante text-center">⚠️ Somente números, sem espaços.</p>
        <button class="btn-acao" onclick="confirmarTrocaPin()">Salvar Novo PIN</button>
    </div>
</div>

<div id="main-content" class="hidden" style="padding-bottom: 100px;">
    <div class="glass-container header-perfil">
        <div class="avatar"><i class="bi bi-person-heart"></i></div>
        <h2 id="nome-filho">--</h2>
        <p id="escola-filho" style="margin:0; font-size: 0.9rem;">--</p>
    </div>

    <div id="lista-atendimentos" style="padding: 0 15px;">
        </div>
</div>

<div id="nav-bar" class="bottom-nav hidden">
    <div class="nav-item active"><i class="bi bi-house-door"></i> Início</div>
    <div class="nav-item"><i class="bi bi-camera"></i> Fotos</div>
    <div class="nav-item" onclick="mostrarTrocaPin()"><i class="bi bi-key"></i> Trocar Senha</div>
    <div class="nav-item" onclick="location.reload()"><i class="bi bi-box-arrow-right"></i> Sair</div>
</div>


<script>
    let sessaoPai = null;

    async function fazerLogin() {
        const usuario = document.getElementById('login-usuario').value;
        const pin = document.getElementById('login-pin').value;

        const res = await fetch('/api/login-pais', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ usuario, pin })
        });

        if(res.ok) {
            sessaoPai = (await res.json()).data;
            if(sessaoPai.primeiro_acesso) {
                document.getElementById('tela-login').classList.add('hidden');
                document.getElementById('tela-troca-pin').classList.remove('hidden');
            } else {
                carregarDashboard();
            }
        } else { alert("Usuário ou PIN incorretos."); }
    }

    async function confirmarTrocaPin() {
        const novoPin = document.getElementById('novo-pin').value;
        if(novoPin.length !== 5 || isNaN(novoPin)) return alert("O PIN deve ter exatamente 5 números.");

        const res = await fetch('/api/alterar-pin', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ usuario_id: sessaoPai.id, novo_pin: novoPin })
        });

        if(res.ok) {
            alert("Senha alterada com sucesso!");
            location.reload();
        }
    }

    function mostrarTrocaPin() {
        document.getElementById('main-content').classList.add('hidden');
        document.getElementById('nav-bar').classList.add('hidden');
        document.getElementById('tela-troca-pin').classList.remove('hidden');
    }

    async function carregarDashboard() {
        document.getElementById('tela-login').classList.add('hidden');
        document.getElementById('main-content').classList.remove('hidden');
        document.getElementById('nav-bar').classList.remove('hidden');

        const res = await fetch(`/api/meu-filho/${sessaoPai.aluno_id}`);
        const data = await res.json();
        
        document.getElementById('nome-filho').innerText = data.aluno.nome_completo;
        document.getElementById('escola-filho').innerText = data.aluno.escola;

        const lista = document.getElementById('lista-atendimentos');
        lista.innerHTML = "<h4>Relatos Recentes</h4>";
        data.historico.forEach(h => {
            const dataF = new Date(h.data_hora).toLocaleDateString('pt-BR');
            const isNovo = !h.visualizado_em; // Se visualizado_em for nulo, é novo

            lista.innerHTML += `
                <div class="card-atendimento" id="card-${h.id}" onclick="lerRelato(${h.id}, ${isNovo})">
                    <div style="font-size: 1.5rem; color: var(--primary-blue);">
                        <i class="bi ${isNovo ? 'bi-envelope-exclamation-fill text-danger' : 'bi-check2-all text-success'}"></i>
                    </div>
                    <div style="flex-grow: 1;">
                        <div class="d-flex justify-content-between">
                            <b>${h.especialidade}</b>
                            ${isNovo ? '<span class="piscante">NOVO</span>' : ''}
                        </div>
                        <div style="font-size: 0.8rem; color: #666;">${dataF}</div>
                        <div class="relato-texto ${isNovo ? 'hidden' : ''}" id="texto-${h.id}">
                            ${h.evolucao || 'Sem relato detalhado.'}
                        </div>
                        ${isNovo ? '<small class="text-primary">Clique para ler o relato</small>' : ''}
                    </div>
                </div>
            `;
        });
    }

    async function lerRelato(id, isNovo) {
        if(isNovo) {
            // Envia para o servidor que o pai leu
            await fetch('/api/confirmar-leitura', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ atendimento_id: id })
            });
            // Atualiza a interface na hora
            document.getElementById(`texto-${id}`).classList.remove('hidden');
            location.reload(); // Recarrega para limpar os alertas de "Novo"
        }
    }    
</script>
</body>
</html>
