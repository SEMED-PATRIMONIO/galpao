server {
    listen 3023;
    server_name dashinform.paiva.api.br;

    root /var/www/informes/public;
    index dashboard.php;

    # Log de erros para facilitar o debug se algo falhar
    error_log /var/log/nginx/informes_error.log;

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location ~ \.php$ {
        include snippets/fastcgi-php.conf;
        # AJUSTE AQUI: Substitua o '8.1' pela versão que você encontrou no passo acima
        fastcgi_pass unix:/var/run/php/php8.3-fpm.sock; 
    }

    # Bloqueio de segurança para pastas do sistema
    location ~ /\.(ht|config|storage|scripts|vendor) {
        deny all;
        return 404;
    }

    # Otimização para servir os PDFs (ajuda na fluidez mobile)
    location /storage/reports/ {
        internal; 
        alias /var/www/informes/storage/reports/;
        add_header Content-Type application/pdf;
    }
}