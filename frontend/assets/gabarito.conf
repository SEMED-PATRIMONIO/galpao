server {
    listen 80;
    server_name gabarito.paiva.api.br;

    # Onde estão os arquivos do seu sistema
    root /var/www/gabarito/public; 
    index index.php index.html;

    # --- CONFIGURAÇÕES PARA O ERRO 413 E 504 ---
    # Aumenta o limite de upload para 100MB
    client_max_body_size 100M;
    
    # Evita que o Nginx interrompa o POST antes de terminar o upload
    client_body_buffer_size 128k;
    client_body_timeout 300s;
    # -------------------------------------------

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location ~ \.php$ {
        include snippets/fastcgi-php.conf;
        
        # Ajuste para a sua versão do PHP (ex: 8.1 ou 8.3)
        fastcgi_pass unix:/var/run/php/php8.3-fpm.sock;

        # --- CONFIGURAÇÕES DE TIMEOUT (PARA NÃO TRAVAR NO 0%) ---
        # Dá tempo ao PHP para processar os PDFs sem o Nginx fechar a porta
        fastcgi_read_timeout 600;
        fastcgi_send_timeout 600;
        fastcgi_connect_timeout 600;
        
        # Impede o Nginx de fazer buffer da resposta (fundamental para o progresso em tempo real)
        fastcgi_buffering off;
        # -------------------------------------------------------
    }

    # Bloqueia acesso a arquivos sensíveis
    location ~ /\.ht {
        deny all;
    }
}