server {
    listen 80;
    server_name gabarito.paiva.api.br;

    # Ajuste o caminho abaixo para a pasta real do seu projeto
    root /var/www/gabarito/public; 
    index index.php index.html;

    # --- CONFIGURAÇÕES DE UPLOAD E PAYLOAD (Mata o erro 413) ---
    client_max_body_size 100M;
    client_body_buffer_size 10M;
    client_body_timeout 600s;
    send_timeout 600s;

    # --- LOGS PARA DEBUG ---
    access_log /var/log/nginx/gabarito_access.log;
    error_log /var/log/nginx/gabarito_error.log;

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # --- CONFIGURAÇÃO DO PHP-FPM ---
    location ~ \.php$ {
        include snippets/fastcgi-php.conf;
        
        fastcgi_pass unix:/var/run/php/php8.3-fpm.sock;

        # --- CONTROLE DE BUFFERING (Crucial para o progresso 0%) ---
        # Desativa o buffer para que o Nginx envie o progresso ao Cloudflare na hora
        fastcgi_buffering off;
        fastcgi_request_buffering off;
        
        # --- TIMEOUTS LONGOS (Para o OCR não cair no meio) ---
        fastcgi_read_timeout 3600s;
        fastcgi_send_timeout 3600s;
        fastcgi_connect_timeout 3600s;

        # Repassa parâmetros reais de IP (útil por trás do Cloudflare)
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        include fastcgi_params;
    }

    # --- SEGURANÇA BÁSICA ---
    location ~ /\.ht {
        deny all;
    }

    location ~ /\.git {
        deny all;
    }
}