<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Validador de Remessa - SEMED</title>
    <style>
        body {
            margin: 0; padding: 0;
            background: linear-gradient(135deg, #e0f2fe 0%, #ffffff 100%);
            min-height: 100vh;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            position: relative;
            display: flex; flex-direction: column; align-items: center;
        }
        body::before {
            content: "";
            position: fixed; top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 80%; height: 80%;
            background: url('assets/braque.jpg') no-repeat center;
            background-size: contain;
            opacity: 0.05; 
            z-index: 0;
            pointer-events: none;
        }
        .container { position: relative; z-index: 1; width: 90%; max-width: 600px; padding: 20px; margin-top: 20px; }
        .header { display: flex; align-items: center; justify-content: center; margin-bottom: 20px; }
        .header img { height: 50px; }
        .card { 
            background: rgba(255, 255, 255, 0.95);
            border-radius: 15px; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            padding: 20px;
            border-top: 5px solid #0ea5e9;
        }
        .status-badge {
            background: #22c55e; color: white; padding: 5px 15px;
            border-radius: 20px; font-weight: bold; font-size: 0.9rem;
            display: inline-block; margin-bottom: 15px;
        }
        .status-erro { background: #ef4444; }
        .data-row { border-bottom: 1px solid #e2e8f0; padding: 10px 0; display: flex; justify-content: space-between; }
        .data-label { color: #64748b; font-size: 0.85rem; font-weight: bold; }
        .data-value { color: #1e293b; font-size: 0.9rem; text-align: right; font-weight: 500; }
        .timer-msg { margin-top: 20px; text-align: center; color: #ef4444; font-size: 0.75rem; font-weight: bold; }
        #carregando { text-align: center; color: #64748b; padding: 20px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <img src="assets/logap.png" alt="Logo Educação">
        </div>

        <div class="card" id="card-conteudo">
            <div id="carregando">Verificando autenticidade...</div>
            <div id="resultado" style="display: none;">
                <div class="status-badge" id="badge-status">✓ DOCUMENTO AUTÊNTICO</div>
                <h3>Informações da Remessa</h3>
                
                <div class="data-row"><span class="data-label">Nº Remessa</span> <span class="data-value" id="lbl-remessa"></span></div>
                <div class="data-row"><span class="data-label">Unidade Destino</span> <span class="data-value" id="lbl-destino"></span></div>
                <div class="data-row"><span class="data-label">Solicitado por</span> <span class="data-value" id="lbl-solicitante"></span></div>
                <div class="data-row"><span class="data-label">Autorizado por</span> <span class="data-value" id="lbl-autorizador"></span></div>
                
                <p class="timer-msg">Esta consulta será encerrada em <span id="timer">60</span>s para segurança.</p>
            </div>
        </div>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const remessaId = urlParams.get('id');
        let timeLeft = 60;
        let countdown;

        async function carregarDados() {
            if (!remessaId) {
                mostrarErro("Nenhum código de validação fornecido.");
                return;
            }

            try {
                const res = await fetch(`/api/validar/${remessaId}`);
                const data = await res.json();

                if (!res.ok) throw new Error(data.error);

                document.getElementById('carregando').style.display = 'none';
                document.getElementById('resultado').style.display = 'block';

                document.getElementById('lbl-remessa').innerText = '#' + data.remessa_id;
                document.getElementById('lbl-destino').innerText = data.destino_final;
                document.getElementById('lbl-solicitante').innerText = data.solicitante || '---';
                document.getElementById('lbl-autorizador').innerText = data.quem_autorizou || '---';

                iniciarTimer();
            } catch (err) {
                mostrarErro(err.message);
            }
        }

        function mostrarErro(mensagem) {
            document.getElementById('carregando').style.display = 'none';
            document.getElementById('resultado').style.display = 'block';
            document.getElementById('resultado').innerHTML = `
                <div class="status-badge status-erro">❌ DOCUMENTO NÃO RECONHECIDO</div>
                <p style="text-align:center; color:#333; margin-top:15px;">${mensagem}</p>
                <p style="text-align:center; font-size:0.8rem; color:#666;">Este documento pode ser falso ou ter sido alterado.</p>
            `;
        }

        function iniciarTimer() {
            const timerEl = document.getElementById('timer');
            countdown = setInterval(() => {
                timeLeft--;
                timerEl.innerText = timeLeft;
                if (timeLeft <= 0) {
                    clearInterval(countdown);
                    document.body.innerHTML = `
                        <div style="text-align:center; margin-top:50px; padding:20px; font-family:sans-serif;">
                            <h2>Sessão Expirada</h2>
                            <p>Por motivos de segurança e economia de recursos, esta consulta foi encerrada.</p>
                        </div>`;
                }
            }, 1000);
        }

        carregarDados();
    </script>
</body>
</html>
