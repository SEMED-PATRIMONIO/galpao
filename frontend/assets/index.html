<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard OLITEMQ - Gestão de Inscrições</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        :root { --gov-blue: #004587; --gov-gold: #ffcc00; }
        body { 
            background: url('olimpiada.png') no-repeat center center fixed; 
            background-size: cover;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
        }
        /* Estilos do Painel */
        .sidebar-title { color: var(--gov-blue); font-weight: 800; letter-spacing: -1px; }
        
        /* CORREÇÃO: 'border-none' e 'shadow' não existem no CSS. O correto é 'border: none' e 'box-shadow' */
        .stat-card { 
            background: white; 
            border-radius: 15px; 
            padding: 25px; 
            border: none; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.05); 
            transition: 0.3s; 
            position: relative; 
        }
        .stat-card:hover { transform: translateY(-5px); }
        .stat-icon { font-size: 2rem; opacity: 0.3; position: absolute; right: 20px; top: 20px; }
        .stat-value { font-size: 2.5rem; font-weight: bold; color: var(--gov-blue); margin: 10px 0; }
        .stat-label { text-transform: uppercase; font-size: 0.75rem; font-weight: bold; color: #6c757d; }
        
        .table-container { 
            background: white; 
            border-radius: 15px; 
            overflow: hidden; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.05); 
        }
        .table thead { background: var(--gov-blue); color: white; }
        
        /* Formatação de Impressão A4 Retrato */
        @media print {
            @page {
                size: auto;
                margin: 0mm; /* Define margem zero para o papel, removendo lixos do navegador */
            }
            .no-print { display: none !important; }
            body { 
                background: white !important; 
                padding: 0; 
                margin: 0; 
            }
            .print-page { 
                display: block !important; 
                width: 210mm; 
                height: 297mm; 
                padding: 15mm; /* Criamos a margem interna para o conteúdo não bater na borda */
                margin: 0;
                page-break-after: always;
            }
            .ficha-header { border-bottom: 2px solid var(--gov-blue); margin-bottom: 20px; padding-bottom: 10px; }
        }
        
        .print-page { display: none; }
        .badge-turno { font-size: 0.8rem; padding: 5px 10px; border-radius: 20px; font-weight: bold; }
        .bg-manha { background: #e3f2fd; color: #0d47a1; }
        .bg-tarde { background: #fff8e1; color: #ff8f00; }
        .bg-noite { background: #ede7f6; color: #4527a0; }
    </style>
</head>
<body>

    <div class="container-fluid py-4 no-print">
        <div class="container">
            <div class="d-flex justify-content-between align-items-center mb-5">
                <div class="d-flex align-items-center gap-4">
                    <div class="d-flex align-items-center gap-3">
                        <img src="logobrasao.png" alt="SEMED" style="height: 80px; width: auto; object-fit: contain;">
                        <img src="olitemq.png" alt="OMEQ" style="height: 80px; width: auto; object-fit: contain;">
                    </div>
                </div>    
                <div class="border-start ps-4 ms-2">
                    <p class="text-muted m-0">Gestão de Inscrições e Auditoria</p>
                </div>
                <div class="d-flex gap-2">
                    <a href="/gerar-pdf-geral" target="_blank" class="btn btn-danger d-flex align-items-center gap-2">
                        <i class="bi bi-file-earmark-pdf-fill"></i> Imprimir Todas
                    </a>
                    <button onclick="compartilharTudo()" class="btn btn-warning d-flex align-items-center gap-2">
                        <i class="bi bi-share-fill"></i> Compartilhar Todas
                    </button>
                </div>
            </div>

            <div class="row g-4 mb-5">
                <div class="col-md-3">
                    <div class="stat-card">
                        <i class="bi bi-people stat-icon"></i>
                        <div class="stat-label">Total de Alunos</div>
                        <div class="stat-value" id="count-alunos">0</div>
                    </div>
                </div>
                <div class="col-md-3">
                    <div class="stat-card">
                        <i class="bi bi-door-open stat-icon"></i>
                        <div class="stat-label">Turmas Inscritas</div>
                        <div class="stat-value" id="count-turmas">0</div>
                    </div>
                </div>
                <div class="col-md-3">
                    <div class="stat-card">
                        <i class="bi bi-building stat-icon"></i>
                        <div class="stat-label">Escolas</div>
                        <div class="stat-value" id="count-escolas">0</div>
                    </div>
                </div>
                <div class="col-md-3">
                    <div class="stat-card">
                        <i class="bi bi-clock-history stat-icon"></i>
                        <div class="stat-label">Último Envio</div>
                        <div class="stat-value" id="last-update" style="font-size: 1.2rem; margin-top: 25px;">--:--</div>
                    </div>
                </div>
            </div>

            <div class="row g-4">
                <div class="col-md-4">
                    <div class="stat-card">
                        <h5 class="fw-bold mb-4">Distribuição por Turno</h5>
                        <div style="height: 250px;">
                            <canvas id="chartTurnos"></canvas>
                        </div>
                    </div>
                </div>
                <div class="col-md-8">
                    <div class="stat-card">
                        <h5 class="fw-bold mb-4">Inscrições por Unidade Escolar</h5>
                        <div class="table-responsive" style="max-height: 250px;">
                            <table class="table table-sm table-borderless align-middle">
                                <tbody id="lista-escolas"></tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>

            <div class="table-container mt-5">
                <table class="table table-hover align-middle mb-0">
                    <thead>
                        <tr>
                            <th class="ps-4">Unidade Escolar</th>
                            <th>Ano / Turma</th>
                            <th>Turno</th>
                            <th>Auditoria (IP / Data)</th>
                            <th class="text-center pe-4">Ação</th>
                        </tr>
                    </thead>
                    <tbody id="main-table-body"></tbody>
                </table>
            </div>
        </div>
    </div>

    <div id="print-area" class="print-page bg-white">
        <div id="print-content"></div>
    </div>

    <script>
        let rawData = [];
        let chartInstance = null;

        async function fetchData() {
            try {
                const response = await fetch('/dados');
                rawData = await response.json();
                processData();
            } catch (error) {
                console.error("Erro ao buscar dados:", error);
            }
        }

        function processData() {
            let totalAlunos = 0;
            let escolasCount = {};
            let turnosCount = { 'MANHÃ': 0, 'TARDE': 0 };
            let ultimaData = null;

            const tableBody = document.getElementById('main-table-body');
            const listEscolas = document.getElementById('lista-escolas');
            tableBody.innerHTML = "";
            listEscolas.innerHTML = "";

            rawData.forEach((item, index) => {
                // Processamento de Alunos (JSON)
                const listaAlunos = typeof item.alunos === 'string' ? JSON.parse(item.alunos) : item.alunos;
                const alunosValidos = Array.isArray(listaAlunos) ? listaAlunos.filter(n => n && n.trim() !== "").length : 0;
                totalAlunos += alunosValidos;

                // Escolas e Turnos
                escolasCount[item.escola] = (escolasCount[item.escola] || 0) + 1;
                
                const turnoUpper = (item.turno || '').toUpperCase();
                if (turnosCount[turnoUpper] !== undefined) turnosCount[turnoUpper]++;

                // Auditoria de Data
                const dataEnvio = new Date(item.data_hora_envio);
                if (!isNaN(dataEnvio.getTime())) {
                    if (!ultimaData || dataEnvio > ultimaData) ultimaData = dataEnvio;
                }

                // Renderizar Tabela Principal
                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td class="ps-4 fw-bold">${item.escola}</td>
                    <td>${item.ano} - <span class="badge bg-secondary">${item.turma}</span></td>
                    <td><span class="badge-turno bg-${turnoUpper === 'MANHÃ' ? 'manha' : turnoUpper === 'TARDE' ? 'tarde' : 'noite'}">${item.turno}</span></td>
                    <td>... auditoria ...</td>
                    <td class="text-center pe-4">
                        <div class="btn-group">
                            <button onclick="gerarFichaIndividual(${index})" class="btn btn-sm btn-primary" title="Imprimir">
                                <i class="bi bi-printer"></i>
                            </button>
                            <button onclick="compartilharIndividual(${item.id}, '${item.escola}', '${item.turma}')" class="btn btn-sm btn-info text-white" title="Compartilhar">
                                <i class="bi bi-share-fill"></i>
                            </button>
                        </div>
                    </td>
                `;
                tableBody.appendChild(tr);
            });

            // Atualizar Contadores
            document.getElementById('count-alunos').innerText = totalAlunos;
            document.getElementById('count-turmas').innerText = rawData.length;
            document.getElementById('count-escolas').innerText = Object.keys(escolasCount).length;
            document.getElementById('last-update').innerText = ultimaData ? ultimaData.toLocaleTimeString('pt-BR', {hour: '2-digit', minute:'2-digit'}) : '--:--';

            // Lista Lateral de Escolas
            Object.keys(escolasCount).sort().forEach(esc => {
                const row = `<tr><td>${esc}</td><td class="text-end"><span class="badge rounded-pill bg-primary">${escolasCount[esc]} turmas</span></td></tr>`;
                listEscolas.innerHTML += row;
            });

            renderChart(turnosCount);
        }

        function renderChart(data) {
            const ctx = document.getElementById('chartTurnos').getContext('2d');
            if (chartInstance) chartInstance.destroy();
            chartInstance = new Chart(ctx, {
                type: 'doughnut',
                data: {
                    labels: Object.keys(data),
                    datasets: [{
                        data: Object.values(data),
                        backgroundColor: ['#004587', '#ffcc00', '#2c3e50'],
                        borderWidth: 0
                    }]
                },
                options: { maintainAspectRatio: false, plugins: { legend: { position: 'bottom' } } }
            });
        }

        function compartilharTudo() {
            const url = window.location.origin + "/gerar-pdf-geral";
            if (navigator.share) {
                navigator.share({
                    title: 'OMEQ 2026 - Todas as Inscrições',
                    text: 'Segue o relatório completo das inscrições da Olimpíada de Matemática.',
                    url: url
                }).catch(console.error);
            } else {
                alert("Link copiado: " + url);
            }
        }

        function compartilharIndividual(id, escola, turma) {
            // Usamos a nova rota que criamos no server.js
            const url = window.location.origin + "/gerar-pdf-individual/" + id;
            if (navigator.share) {
                navigator.share({
                    title: `Inscrição OMEQ - ${escola}`,
                    text: `Ficha de Inscrição da Turma ${turma} - ${escola}`,
                    url: url
                }).catch(console.error);
            } else {
                alert("Link da Ficha: " + url);
            }
        }

        function gerarFichaIndividual(idx) {
            const r = rawData[idx];
            const listaAlunos = typeof r.alunos === 'string' ? JSON.parse(r.alunos) : r.alunos;
            
            let alunosTabela = "";
            for(let i=0; i<15; i++) {
                const nome = listaAlunos[i] || "";
                alunosTabela += `
                    <tr style="height: 20px;">
                        <td width="30" align="center" style="font-size: 8.5pt;">${i+1}</td>
                        <td style="font-size: 8.5pt;">${nome}</td>
                        <td width="180"></td>
                    </tr>`;
            }

            document.getElementById('print-content').innerHTML = `
                <div style="display: flex; align-items: center; justify-content: space-between; height: 50px; margin-bottom: 5px;">
                    <div style="width: 100px; text-align: left;">
                        <img src="logobrasao.png" style="height: 35px; width: auto;">
                    </div>
                    <div style="flex-grow: 1; text-align: center;">
                        <img src="olitemq.png" style="height: 40px; width: auto;">
                    </div>
                    <div style="width: 100px;"></div>
                </div>
                
                <div style="text-align: center; border-top: 1.5px solid #004587; border-bottom: 1.5px solid #004587; padding: 5px 0; margin-bottom: 15px;">
                    <h1 style="margin:0; font-weight:bold; font-size: 11pt; text-transform: uppercase;">OLIMPÍADA MUNICIPAL DE MATEMÁTICA DAS ESCOLAS DE QUEIMADOS</h1>
                    <p style="margin:0; font-weight:bold; font-size: 10pt;">Ficha Oficial de Inscrição de Turma</p>
                </div>

                <div style="margin-bottom: 10px; font-size: 9pt;">
                    <h6 style="border-bottom: 1px solid #ccc; padding-bottom: 2px; margin-bottom: 8px; font-weight: bold; font-size: 9pt;">DADOS DA UNIDADE</h6>
                    <p style="margin: 1px 0;"><b>Escola:</b> ${r.escola}</p>
                    <div style="display: flex; gap: 30px;">
                        <p style="margin: 1px 0;"><b>Ano:</b> ${r.ano}</p>
                        <p style="margin: 1px 0;"><b>Turma:</b> ${r.turma}</p>
                        <p style="margin: 1px 0;"><b>Turno:</b> ${r.turno}</p>
                    </div>
                    <p style="margin: 1px 0;"><b>E-mail:</b> ${r.email}</p>
                </div>

                <table class="table table-bordered w-100" style="border: 1px solid #333;">
                    <thead class="table-light">
                        <tr style="font-size: 8.5pt; background-color: #f2f2f2;">
                            <th class="text-center" width="30">Nº</th>
                            <th>Nome Completo</th>
                            <th width="180">Assinatura</th>
                        </tr>
                    </thead>
                    <tbody>${alunosTabela}</tbody>
                </table>

                <div style="margin-top: 15px; font-size: 7pt; color: #666; text-align: right;">
                    Auditado via IP: ${r.ip_endereco} | Protocolo: ${r.id} | Gerado em: ${new Date().toLocaleString()}
                </div>
            `;
            window.print();
        }
        // Inicialização
        fetchData();
    </script>
</body>
</html>
