<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Dashboard OMEQ - Administração</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        @media print { 
            .no-print { display: none !important; } 
            .print-page { display: block !important; width: 210mm; height: 297mm; padding: 20mm; margin: 0; }
        }
        .print-page { display: none; }
        body { background: #f0f2f5; }
    </style>
</head>
<body>
<div class="container py-4 no-print">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2>📊 Painel OMEQ Queimados</h2>
        <div>
            <button onclick="exportarExcel()" class="btn btn-success">Exportar Excel</button>
        </div>
    </div>

    <div class="row mb-4">
        <div class="col-md-4">
            <div class="card p-3 text-center shadow-sm">
                <h6>Total de Turmas</h6>
                <h2 id="total-turmas" class="text-primary">0</h2>
            </div>
        </div>
        <div class="col-md-8">
            <div class="card p-3 shadow-sm" style="height: 200px;">
                <canvas id="chartTurnos"></canvas>
            </div>
        </div>
    </div>

    <div class="card shadow-sm">
        <div class="table-responsive">
            <table class="table table-hover mb-0">
                <thead class="table-dark">
                    <tr>
                        <th>Escola</th><th>Ano</th><th>Turno</th><th>Ações</th>
                    </tr>
                </thead>
                <tbody id="tabela-corpo"></tbody>
            </table>
        </div>
    </div>
</div>

<div id="area-impressao" class="print-page bg-white">
    <div class="text-center mb-4">
        <img src="logo.jpeg" style="width: 100px;">
        <h3 class="mt-3">Ficha de Inscrição OMEQ</h3>
    </div>
    <div id="dados-ficha" class="mb-4"></div>
    <table class="table table-bordered">
        <thead><tr><th>Nº</th><th>Nome do Aluno</th></tr></thead>
        <tbody id="lista-alunos-print"></tbody>
    </table>
</div>

<script>
    let dadosGlobais = [];

    async function carregar() {
        const res = await fetch('/dados');
        dadosGlobais = await res.json();
        renderizar();
    }

    function renderizar() {
        document.getElementById('total-turmas').innerText = dadosGlobais.length;
        const corpo = document.getElementById('tabela-corpo');
        corpo.innerHTML = "";
        
        const turnos = { 'MANHÃ': 0, 'TARDE': 0, 'NOITE': 0 };

        dadosGlobais.forEach((r, i) => {
            turnos[r.Turno]++;
            corpo.innerHTML += `<tr>
                <td>${r.Escola}</td><td>${r.Ano}</td><td>${r.Turno}</td>
                <td><button onclick="imprimirFicha(${i})" class="btn btn-sm btn-primary">PDF / Ficha</button></td>
            </tr>`;
        });

        new Chart(document.getElementById('chartTurnos'), {
            type: 'bar',
            data: {
                labels: Object.keys(turnos),
                datasets: [{ label: 'Turmas por Turno', data: Object.values(turnos), backgroundColor: '#004587' }]
            },
            options: { maintainAspectRatio: false }
        });
    }

    function imprimirFicha(idx) {
        const r = dadosGlobais[idx];
        document.getElementById('dados-ficha').innerHTML = `
            <p><b>Escola:</b> ${r.Escola} | <b>Ano:</b> ${r.Ano}</p>
            <p><b>Turma:</b> ${r.Turma} | <b>Turno:</b> ${r.Turno}</p>
            <p><b>E-mail:</b> ${r.Email}</p>
        `;
        let alunosHtml = "";
        for(let i=1; i<=15; i++) {
            if(r[`Aluno ${i}`]) alunosHtml += `<tr><td>${i}</td><td>${r[`Aluno ${i}`]}</td></tr>`;
        }
        document.getElementById('lista-alunos-print').innerHTML = alunosHtml;
        window.print();
    }

    function exportarExcel() {
        window.open('https://resultadomeq.paiva.api.br/dados', '_blank');
    }

    carregar();
</script>
</body>
</html>
