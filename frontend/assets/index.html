<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AEE Digital - Gestão Administrativa</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    
    <style>
        :root {
            --dark-blue: #00264d;
            --mid-blue: #004587;
            --light-blue: #00a8e8;
            --extra-light: #e0f2ff;
            --glass: rgba(255, 255, 255, 0.85);
            --sidebar-w: 240px;
            --actions-w: 180px;
        }

        body {
            background: linear-gradient(135deg, var(--dark-blue) 0%, var(--mid-blue) 50%, var(--light-blue) 100%);
            background-attachment: fixed;
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            height: 100vh;
            overflow: hidden;
            color: #333;
        }

        /* --- TOP BAR --- */
        .top-bar {
            height: 60px;
            background: rgba(0, 0, 0, 0.2);
            backdrop-filter: blur(10px);
            display: flex;
            align-items: center;
            justify-content: flex-end;
            padding: 0 30px;
            color: white;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }

        .user-info { font-size: 0.9rem; margin-right: 15px; }
        .key-btn { 
            cursor: pointer; 
            transition: transform 0.2s; 
            font-size: 1.2rem;
            color: var(--light-blue);
        }
        .key-btn:hover { transform: scale(1.2); color: #fff; }

        /* --- LAYOUT PRINCIPAL --- */
        .main-container {
            display: flex;
            height: calc(100vh - 60px);
        }

        /* Sidebar Esquerda (Seletores) */
        .sidebar-left {
            width: var(--sidebar-w);
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(15px);
            border-right: 1px solid rgba(255,255,255,0.1);
            padding: 20px 10px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .nav-btn {
            background: transparent;
            border: none;
            color: rgba(255,255,255,0.8);
            padding: 12px 15px;
            border-radius: 12px;
            text-align: left;
            display: flex;
            align-items: center;
            gap: 12px;
            transition: all 0.3s;
            font-weight: 500;
        }

        .nav-btn i { font-size: 1.3rem; }
        .nav-btn:hover { background: rgba(255,255,255,0.15); color: #fff; }
        .nav-btn.active { 
            background: var(--light-blue); 
            color: white; 
            box-shadow: 0 4px 15px rgba(0, 168, 232, 0.4);
        }

        /* Área Central (Listagem) */
        .content-area {
            flex: 1;
            padding: 25px;
            overflow-y: auto;
        }

        .glass-panel {
            background: var(--glass);
            border-radius: 20px;
            height: 100%;
            box-shadow: 0 15px 35px rgba(0,0,0,0.2);
            display: flex;
            flex-direction: column;
            border: 1px solid rgba(255,255,255,0.3);
        }

        .panel-header {
            padding: 20px;
            border-bottom: 1px solid #dee2e6;
            font-weight: bold;
            color: var(--dark-blue);
            font-size: 1.2rem;
        }

        /* Tabela e Seleção */
        .list-container { flex: 1; overflow-y: auto; padding: 10px; }
        .data-row {
            padding: 12px 20px;
            margin-bottom: 5px;
            border-radius: 10px;
            background: #fff;
            border: 1px solid #eee;
            cursor: pointer;
            transition: all 0.2s;
            display: grid;
            grid-template-columns: 1fr 2fr 1fr;
            align-items: center;
        }
        .data-row:hover { background: var(--extra-light); }
        .data-row.selected { 
            background: #cfe2ff; 
            border-color: var(--light-blue);
            transform: translateX(5px);
        }

        /* Sidebar Direita (Ações) */
        .sidebar-right {
            width: var(--actions-w);
            padding: 25px 15px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .action-btn {
            height: 80px;
            border-radius: 15px;
            border: none;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-size: 0.8rem;
            font-weight: 600;
            gap: 5px;
            transition: all 0.3s;
            background: var(--glass);
            color: var(--dark-blue);
        }

        .action-btn:disabled { opacity: 0.4; cursor: not-allowed; filter: grayscale(1); }
        .action-btn:not(:disabled):hover { transform: translateY(-3px); box-shadow: 0 5px 15px rgba(0,0,0,0.2); }
        .btn-new { background: #28a745; color: white; }
        .btn-edit { color: var(--mid-blue); }
        .btn-delete { color: #dc3545; }
        .btn-report { color: #6610f2; }

        /* Tooltip custom simples */
        [data-tooltip]:hover::after {
            content: attr(data-tooltip);
            position: absolute; background: #333; color: #fff;
            padding: 5px 10px; border-radius: 5px; font-size: 0.75rem;
            z-index: 100; margin-top: 40px;
        }
    </style>
</head>
<body>

    <div class="top-bar">
        <span class="user-info">Bem-vindo, <strong id="user-name">Carregando...</strong></span>
        <i class="bi bi-key-fill key-btn" onclick="abrirModalSenha()" data-tooltip="Alterar minha senha"></i>
    </div>

    <div class="main-container">
        <div class="sidebar-left">
            <button class="nav-btn active" onclick="mudarTabela('alunos', this)">
                <i class="bi bi-person-badge"></i> Alunos
            </button>
            <button class="nav-btn" onclick="mudarTabela('pais', this)">
                <i class="bi bi-people"></i> Pais/Resp.
            </button>
            <button class="nav-btn" onclick="mudarTabela('profissionais', this)">
                <i class="bi bi-heart-pulse"></i> Profissionais
            </button>
            <button class="nav-btn" onclick="mudarTabela('especialidades', this)">
                <i class="bi bi-tags"></i> Especialidades
            </button>
            <button class="nav-btn" onclick="mudarTabela('usuarios', this)">
                <i class="bi bi-shield-lock"></i> Usuários
            </button>
        </div>

        <div class="content-area">
            <div class="glass-panel">
                <div class="panel-header d-flex justify-content-between align-items-center">
                    <span id="panel-title">Listagem de Alunos</span>
                    
                    <div class="search-box position-relative" style="width: 250px;">
                        <i class="bi bi-search position-absolute top-50 start-0 translate-middle-y ms-3 text-muted"></i>
                        <input type="text" id="input-busca" class="form-control rounded-pill ps-5 border-0 shadow-sm" 
                            placeholder="Pesquisar..." oninput="filtrarDados()"
                            data-tooltip="Digite para filtrar os nomes instantaneamente">
                    </div>
                </div>
                <div class="list-container" id="main-list">
                    <div class="text-center mt-5 text-muted">Carregando dados...</div>
                </div>
            </div>
        </div>

        <div class="sidebar-right">
            <button class="action-btn btn-new" onclick="incluirNovo()" data-tooltip="Cadastrar novo registro">
                <i class="bi bi-plus-circle-fill fs-3"></i> Incluir Novo
            </button>
            <button class="action-btn btn-edit" id="btn-edit" disabled onclick="editarSelecionado()" data-tooltip="Editar dados do registro selecionado">
                <i class="bi bi-pencil-square fs-3"></i> Editar
            </button>
            <button class="action-btn btn-delete" id="btn-inativar" disabled onclick="inativarSelecionado()" data-tooltip="Desativar este registro (não exclui)">
                <i class="bi bi-trash3-fill fs-3"></i> Inativar
            </button>
            <button class="action-btn btn-report" id="btn-report" disabled onclick="gerarRelatorio()" data-tooltip="Gerar PDF ou relatório do item">
                <i class="bi bi-file-earmark-pdf-fill fs-3"></i> Relatório
            </button>
        </div>
    </div>

    <div class="modal fade" id="modalSenha" tabindex="-1">
        <div class="modal-dialog modal-sm modal-dialog-centered">
            <div class="modal-content border-0" style="border-radius: 20px;">
                <div class="modal-body p-4">
                    <h5 class="mb-3">Alterar Senha</h5>
                    <input type="password" id="nova-senha" class="form-control mb-2" placeholder="Nova senha">
                    <button class="btn btn-primary w-100 mt-3" onclick="salvarNovaSenha()">Atualizar</button>
                </div>
            </div>
        </div>
    </div>
    <div class="modal fade" id="modalRelatorio" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-xl modal-dialog-centered">
            <div class="modal-content border-0 shadow-lg" style="border-radius: 20px; height: 90vh;">
                <div class="modal-header bg-dark text-white border-0" style="border-radius: 20px 20px 0 0;">
                    <h5 class="modal-title"><i class="bi bi-file-pdf"></i> Visualização do Relatório</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body p-0 bg-secondary">
                    <iframe id="pdfViewer" src="" width="100%" height="100%" style="border: none;"></iframe>
                </div>
                <div class="modal-footer justify-content-between bg-light" style="border-radius: 0 0 20px 20px;">
                    <div>
                        <button class="btn btn-success rounded-pill px-4" onclick="compartilharWhatsapp()">
                            <i class="bi bi-whatsapp"></i> WhatsApp
                        </button>
                        <button class="btn btn-primary rounded-pill px-4" onclick="baixarPDF()">
                            <i class="bi bi-download"></i> Salvar no Disco
                        </button>
                    </div>
                    <button class="btn btn-outline-dark rounded-pill px-4" data-bs-dismiss="modal">Fechar</button>
                </div>
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
    // --- CONFIGURAÇÕES INICIAIS ---
    const token = localStorage.getItem('aee_token');
    let tabelaAtual = 'alunos';
    let itemSelecionadoId = null;
    let dadosCompletos = [];

    // Verificar se está logado e pegar nome do usuário do Token
    window.onload = () => {
        if (!token) {
            window.location.href = 'login.html';
            return;
        }
        
        // Decodificar token para pegar o nome (Simples)
        const payload = JSON.parse(atob(token.split('.')[1]));
        document.getElementById('user-name').innerText = payload.nome || "Usuário";
        
        carregarDados(); // Carga inicial
    };

    // --- NAVEGAÇÃO ENTRE TABELAS ---
    async function mudarTabela(tabela, btn) {
        // UI: Muda o botão ativo na esquerda
        document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');

        // Lógica: Muda a tabela e reseta seleção
        tabelaAtual = tabela;
        itemSelecionadoId = null;
        atualizarInterfaceAcoes();
        
        const titulos = {
            alunos: 'Listagem de Alunos',
            pais: 'Acessos de Pais/Responsáveis',
            profissionais: 'Profissionais de Saúde',
            especialidades: 'Especialidades Médicas',
            usuarios: 'Usuários da Equipe'
        };
        document.getElementById('panel-title').innerText = titulos[tabela];
        
        carregarDados();
    }

    // --- BUSCA DE DADOS NO BACKEND ---
    async function carregarDados() {
        const container = document.getElementById('main-list');
        container.innerHTML = '<div class="text-center mt-5"><div class="spinner-border text-primary"></div></div>';

        try {
            const res = await fetch(`/api/v2/listagem/completa?tabela=${tabelaAtual}`, {
                headers: { 'Authorization': `Bearer ${token}` }
            });
            const dados = await res.json();

            // Guardamos uma cópia global para filtrar sem precisar do servidor
            dadosCompletos = dados; 
            
            // Limpa o campo de busca ao trocar de tabela
            document.getElementById('input-busca').value = '';

            if (dadosCompletos.length === 0) {
                container.innerHTML = '<div class="text-center mt-5 text-muted">Nenhum registro ativo encontrado.</div>';
                return;
            }

            renderizarLista(dadosCompletos);
        } catch (err) {
            container.innerHTML = '<div class="text-center mt-5 text-danger">Erro ao carregar dados do servidor.</div>';
        }
    }

    // --- NOVA FUNÇÃO DE FILTRAGEM INSTANTÂNEA ---
    function filtrarDados() {
        const termo = document.getElementById('input-busca').value.toLowerCase();
        
        // Filtra os dados que estão na memória
        const filtrados = dadosCompletos.filter(item => {
            const nome = (item.nome_completo || item.nome || item.usuario || "").toLowerCase();
            const ra = (item.ra || "").toLowerCase();
            const escola = (item.escola || "").toLowerCase();
            
            return nome.includes(termo) || ra.includes(termo) || escola.includes(termo);
        });

        renderizarLista(filtrados);
    }

    // --- RENDERIZAÇÃO DINÂMICA ---
    function renderizarLista(dados) {
        const container = document.getElementById('main-list');
        
        container.innerHTML = dados.map(item => {
            // Lógica para mostrar colunas diferentes dependendo da tabela
            let infoPrincipal = item.nome_completo || item.nome || item.usuario;
            let infoSecundaria = item.ra || item.especialidade || (item.escola ? item.escola : "");
            let dataInfo = item.criado_em ? new Date(item.criado_em).toLocaleDateString() : "";

            return `
                <div class="data-row" id="row-${item.id}" onclick="selecionarItem(${item.id}, this)">
                    <div><strong>${infoPrincipal}</strong></div>
                    <div class="text-muted small">${infoSecundaria}</div>
                    <div class="text-end text-muted small">${dataInfo}</div>
                </div>
            `;
        }).join('');
    }

    // --- LÓGICA DE SELEÇÃO ---
    function selecionarItem(id, element) {
        const jaSelecionado = element.classList.contains('selected');

        // Remove seleção de todos
        document.querySelectorAll('.data-row').forEach(row => row.classList.remove('selected'));

        if (jaSelecionado) {
            // Se clicou no mesmo, desseleciona tudo
            itemSelecionadoId = null;
        } else {
            // Seleciona o novo
            element.classList.add('selected');
            itemSelecionadoId = id;
        }

        atualizarInterfaceAcoes();
    }

    // Ativa/Desativa botões da direita
    function atualizarInterfaceAcoes() {
        const btnEdit = document.getElementById('btn-edit');
        const btnInativar = document.getElementById('btn-inativar');
        const btnReport = document.getElementById('btn-report');

        if (itemSelecionadoId) {
            btnEdit.disabled = false;
            btnInativar.disabled = false;
            btnReport.disabled = false;
        } else {
            btnEdit.disabled = true;
            btnInativar.disabled = true;
            btnReport.disabled = true;
        }
    }

    // --- ALTERAR SENHA (USUÁRIO LOGADO) ---
    function abrirModalSenha() {
        const myModal = new bootstrap.Modal(document.getElementById('modalSenha'));
        myModal.show();
    }

    async function salvarNovaSenha() {
        const nova = document.getElementById('nova-senha').value;
        if(nova.length < 4) return alert("Senha muito curta!");

        try {
            const res = await fetch('/api/v2/usuario/alterar-senha', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
                body: JSON.stringify({ novaSenha: nova })
            });
            if(res.ok) {
                alert("Senha alterada com sucesso!");
                bootstrap.Modal.getInstance(document.getElementById('modalSenha')).hide();
            }
        } catch (err) { alert("Erro ao mudar senha."); }
    }

    // --- INATIVAR (LIXEIRA) ---
    async function inativarSelecionado() {
        if (!itemSelecionadoId) return;
        if (!confirm("Deseja realmente inativar este registro? Ele não será mais exibido na lista.")) return;

        try {
            const res = await fetch(`/api/v2/${tabelaAtual}/inativar/${itemSelecionadoId}`, {
                method: 'PUT',
                headers: { 'Authorization': `Bearer ${token}` }
            });

            if (res.ok) {
                // Lógica de "Ponteiro": Pega o próximo elemento antes de remover
                const rowAtual = document.getElementById(`row-${itemSelecionadoId}`);
                const proximo = rowAtual.nextElementSibling;
                
                showToast("Registro inativado com sucesso!");
                
                // Recarrega a lista
                await carregarDados();

                // Se existia um próximo, foca nele
                if (proximo) {
                    const novoId = proximo.id.replace('row-', '');
                    const novoElemento = document.getElementById(proximo.id);
                    if (novoElemento) selecionarItem(novoId, novoElemento);
                }
            }
        } catch (err) { alert("Erro ao inativar."); }
    }

    // --- FORMULÁRIOS DINÂMICOS (INCLUIR NOVO) ---
    function incluirNovo() {
        const body = document.getElementById('modalBody');
        document.getElementById('modalLabel').innerText = `Novo em ${tabelaAtual}`;
        
        let html = '';
        if (tabelaAtual === 'alunos') {
            html = `
                <input type="text" id="f-nome" class="form-control mb-3 rounded-3" placeholder="Nome Completo">
                <input type="text" id="f-ra" class="form-control mb-3 rounded-3" placeholder="RA">
                <input type="text" id="f-escola" class="form-control mb-3 rounded-3" placeholder="Escola">
            `;
        } else if (tabelaAtual === 'profissionais') {
            html = `
                <input type="text" id="f-nome" class="form-control mb-3 rounded-3" placeholder="Nome do Profissional">
                <input type="text" id="f-login" class="form-control mb-3 rounded-3" placeholder="Login de Acesso">
                <input type="password" id="f-senha" class="form-control mb-3 rounded-3" placeholder="Senha Inicial">
            `;
        }
        // ... Adicionar outros campos para Pais, Especialidades conforme sua estrutura

        body.innerHTML = html;
        new bootstrap.Modal(document.getElementById('modalRegistro')).show();
    }

    // --- AUXILIARES ---
    function showToast(msg) {
        document.getElementById('toast-text').innerText = msg;
        const toast = new bootstrap.Toast(document.getElementById('liveToast'));
        toast.show();
    }

    async function gerarRelatorio() {
        if (!itemSelecionadoId) {
            showToast("Selecione um registro para gerar o relatório do grupo.", "error");
            // Nota: Conforme seu pedido, o relatório é da LISTAGEM atual, 
            // mas o botão ativa quando um item é selecionado.
        }

        showToast("Gerando relatório... por favor aguarde.", "info");

        try {
            const res = await fetch('/api/v2/relatorio/gerar', {
                method: 'POST',
                headers: { 
                    'Content-Type': 'application/json',
                    'Authorization': `Bearer ${token}` 
                },
                body: JSON.stringify({ tabela: tabelaAtual })
            });

            const blob = await res.blob();
            if (pdfBlobUrl) URL.revokeObjectURL(pdfBlobUrl); // Limpa memória anterior
            pdfBlobUrl = URL.createObjectURL(blob);

            // Exibe no iframe e abre o modal
            document.getElementById('pdfViewer').src = pdfBlobUrl;
            new bootstrap.Modal(document.getElementById('modalRelatorio')).show();

        } catch (err) {
            showToast("Falha ao comunicar com o gerador de PDF.", "error");
        }
    }

    function baixarPDF() {
        const link = document.createElement('a');
        link.href = pdfBlobUrl;
        link.download = `Relatorio_${tabelaAtual}_${new Date().getTime()}.pdf`;
        link.click();
    }

    function compartilharWhatsapp() {
        // Como o PDF está no cliente, o compartilhamento direto de arquivo via URL de WhatsApp é limitado.
        // A melhor prática é avisar o usuário para salvar e anexar, ou usar a Web Share API (se estiver no celular).
        if (navigator.share) {
            fetch(pdfBlobUrl).then(res => res.blob()).then(blob => {
                const file = new File([blob], "relatorio.pdf", { type: "application/pdf" });
                navigator.share({
                    title: 'Relatório AEE',
                    files: [file]
                }).catch(() => showToast("Erro ao compartilhar.", "error"));
            });
        } else {
            alert("Para compartilhar via WhatsApp Web, salve o arquivo em seu disco e anexe-o na conversa desejada.");
            baixarPDF();
        }
    }


</script>
    <div class="modal fade" id="modalRegistro" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content border-0 shadow-lg" style="border-radius: 25px; background: var(--glass); backdrop-filter: blur(15px);">
                <div class="modal-header border-0">
                    <h5 class="modal-title fw-bold" id="modalLabel">Novo Registro</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body" id="modalBody">
                    </div>
                <div class="modal-footer border-0">
                    <button type="button" class="btn btn-light rounded-pill" data-bs-dismiss="modal">Cancelar</button>
                    <button type="button" class="btn btn-primary rounded-pill px-4" onclick="salvarDados()">Salvar Registro</button>
                </div>
            </div>
        </div>
    </div>

    <div id="toast-container" class="position-fixed bottom-0 end-0 p-3" style="z-index: 1060">
        <div id="liveToast" class="toast align-items-center text-white bg-dark border-0 rounded-4" role="alert" aria-live="assertive" aria-atomic="true">
            <div class="d-flex">
                <div class="toast-body" id="toast-text"></div>
                <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="modal"></button>
            </div>
        </div>
    </div>
</body>
</html>
