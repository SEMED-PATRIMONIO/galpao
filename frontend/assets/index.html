<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ficha de Inscrição</title>
    <style>
        :root { --success-green: #28a745; --gov-blue: #004587; --text-dark: #333; }
        body { font-family: 'Segoe UI', sans-serif; background: #f4f7f6; margin: 0; padding: 10px; display: flex; justify-content: center; }
        
        /* Container Principal */
        .app-card { background: white; width: 100%; max-width: 420px; border-radius: 25px; box-shadow: 0 15px 35px rgba(0,0,0,0.15); overflow: hidden; margin-top: 10px; }
        
        /* Tarja Azul com Logos */
        .logo-area { 
            padding: 45px 20px; 
            text-align: center; 
            background: var(--gov-blue); 
            position: relative; 
        }
        .logo-main { width: 250px; height: auto; margin-top: 20px; filter: drop-shadow(0 4px 6px rgba(0,0,0,0.3)); }
        .logo-brass { position: absolute; top: 15px; right: 15px; width: 85px; height: auto; }

        .content { padding: 30px 25px; text-align: center; }

        /* Títulos Oficiais */
        .form-header-title {
            font-family: 'Times New Roman', Times, serif;
            font-weight: bold;
            font-size: 1.25rem;
            line-height: 1.2;
            color: var(--text-dark);
            margin-bottom: 8px;
            text-transform: uppercase;
        }
        .form-header-subtitle { font-weight: bold; font-size: 1.1rem; color: #555; margin-bottom: 30px; display: block; }

        h3 { color: var(--gov-blue); margin-top: 0; border-bottom: 2px solid #f0f0f0; padding-bottom: 12px; font-size: 1.4rem; }
        label { display: block; font-weight: bold; margin: 18px 0 6px; font-size: 0.95rem; text-align: left; color: #444; }
        input, select { width: 100%; padding: 14px; border: 1px solid #d1d1d1; border-radius: 12px; box-sizing: border-box; font-size: 1rem; background: #fff; transition: 0.3s; }
        input:focus { border-color: var(--gov-blue); outline: none; box-shadow: 0 0 0 3px rgba(0,69,135,0.1); }
        
        /* Wrapper do E-mail */
        .email-wrapper { position: relative; display: flex; align-items: center; }
        .email-wrapper input { padding-right: 175px; }
        .email-suffix { position: absolute; right: 14px; color: #777; font-size: 0.85rem; pointer-events: none; font-weight: 600; }

        .btn-main { background: var(--gov-blue); color: white; border: none; padding: 18px; width: 100%; border-radius: 12px; font-weight: bold; margin-top: 25px; cursor: pointer; font-size: 1.1rem; transition: 0.2s; }
        .btn-main:active { transform: scale(0.98); opacity: 0.9; }
        .hidden { display: none !important; }
        
        /* Modal de Sucesso (O 'V' de Verificado) */
        #success-modal { 
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); 
            background: white; padding: 40px; border-radius: 30px; 
            border-top: 12px solid var(--success-green); 
            box-shadow: 0 20px 60px rgba(0,0,0,0.4); z-index: 9999; 
            text-align: center; width: 300px; 
        }
        .check-icon { font-size: 80px; color: var(--success-green); line-height: 1; margin-bottom: 15px; }
        .fade-out { opacity: 0; transition: opacity 1s ease-out; }

        .student-row { display: flex; gap: 10px; margin-bottom: 12px; align-items: center; }
        .student-num { width: 30px; font-weight: bold; color: var(--gov-blue); font-size: 1rem; text-align: right; }
    </style>
</head>
<body>

    <div class="app-card">
        <div class="logo-area">
            <img src="logobrasao.png" class="logo-brass" alt="Brasão de Queimados">
            <img src="logomeq.png" class="logo-main" alt="Logo OMEQ">
        </div>

        <div class="content">
            <div class="form-header-title">Olimpíada Municipal de Matemática das Escolas de Queimados</div>
            <div class="form-header-subtitle">Ficha de Inscrição de Turma</div>
            <div id="step-1">
                <h3>Identificação</h3>
                <label>Nome da Escola:</label>
                <select id="escola" onchange="verificarExistente()">
                    <option value="">Selecione...</option>
                    <option>CEADQ</option>
                    <option>E M ALBERTO PIRRO</option>
                    <option>E M ALLAN KARDEC</option>
                    <option>E M ANNA PEROBELLI</option>
                    <option>E M CARLOS PEREIRA NETO</option>
                    <option>E M CLEDON CAVALCANTE</option>
                    <option>E M DIVA TEIXEIRA</option>
                    <option>E M DR FRANCISCO M BRANDAO</option>
                    <option>E M ELOI TEIXEIRA</option>
                    <option>E M GILVANEI PEREIRA</option>
                    <option>E M JOAQUIM DE FREITAS</option>
                    <option>E M JOSE ANASTACIO</option>
                    <option>E M JOSE BITTENCOURT</option>
                    <option>E M JOSE DE ANCHIETA</option>
                    <option>E M LEOPOLDO MACHADO</option>
                    <option>E M LUIZ DE CAMOES</option>
                    <option>E M MARIA C P XANCHAO</option>
                    <option>E M METODISTA</option>
                    <option>E M MONTEIRO LOBATO</option>
                    <option>E M NELSON CARNEIRO</option>
                    <option>E M OSCAR WEINSCHENCK</option>
                    <option>E M PASTOR ARSENIO</option>
                    <option>E M PAULO FREIRE</option>
                    <option>E M SANTO EXPEDITO</option>
                    <option>E M SAO JOSE</option>
                    <option>E M SCINTILLA EXEL</option>
                    <option>E M SEBASTIAO VERISSIMO</option>
                    <option>E M TIRADENTES</option>
                    <option>E M UBIRAJARA FERREIRA</option>
                    <option>E M VALCIRA SANTANA</option>
                    <option>E M WALDICK PEREIRA</option>
                    <option>E M WASHINGTON MANOEL</option>
                </select>

                <label>Ano de Escolaridade:</label>
                <select id="ano" onchange="verificarExistente()">
                    <option value="">Selecione...</option>
                    <option>3º ano</option><option>4º ano</option><option>5º ano</option>
                    <option>6º ano</option><option>7º ano</option><option>8º ano</option>
                    <option>9º ano</option><option>EJA</option>
                </select>
                <div id="msg-status" style="margin-top:10px; font-size:0.8rem;"></div>
                <button class="btn-main" onclick="proximo(2)">Avançar ➡️</button>
            </div>

            <div id="step-2" class="hidden">
                <h3>Dados da Escola</h3>
                <label>E-mail Institucional:</label>
                <div class="email-wrapper">
                    <input type="text" id="email-user" placeholder="prefixo">
                    <span class="email-suffix">@queimados.rj.gov.br</span>
                </div>

                <label>Número da Turma:</label>
                <input type="text" id="turma">

                <label>Turno:</label>
                <div style="display: flex; gap: 10px; margin-top: 5px;">
                    <label style="font-weight: normal;"><input type="radio" name="turno" value="MANHÃ"> Manhã</label>
                    <label style="font-weight: normal;"><input type="radio" name="turno" value="TARDE"> Tarde</label>
                    <label style="font-weight: normal;"><input type="radio" name="turno" value="NOITE"> Noite</label>
                </div>
                <button class="btn-main" onclick="proximo(3)">Próximo: Alunos ➡️</button>
            </div>

            <div id="step-3" class="hidden">
                <h3>Lista de Alunos (Máx. 15)</h3>
                <div id="lista-alunos">
                    </div>
                <button class="btn-main" style="background: var(--success-green);" onclick="finalizar()">Enviar Formulário ✅</button>
            </div>
        </div>
    </div>

    <div id="success-modal" class="hidden">
        <div class="check-icon">✔</div>
        <h2 style="color: var(--success-green); margin:0; font-size: 2rem;">Recebido!</h2>
        <p style="font-weight: 500; color: #666; margin-top: 10px;">Inscrição salva com sucesso.</p>
    </div>

<script>
    let dadosCarregados = null;

    function proximo(n) {
        if(n==2 && (!document.getElementById('escola').value || !document.getElementById('ano').value)) {
            return alert("Selecione a Escola e o Ano!");
        }
        if(n==3 && !document.getElementById('turma').value) {
            return alert("Informe o número ou nome da turma!");
        }
        document.querySelectorAll('[id^="step-"]').forEach(s => s.classList.add('hidden'));
        document.getElementById('step-'+n).classList.remove('hidden');
        if(n==3) renderAlunos();
    }

    function renderAlunos() {
        const container = document.getElementById('lista-alunos');
        container.innerHTML = "";
        for(let i=1; i<=15; i++) {
            const val = (dadosCarregados && dadosCarregados.alunos && dadosCarregados.alunos[i-1]) ? dadosCarregados.alunos[i-1] : "";
            container.innerHTML += `
                <div class="student-row">
                    <span class="student-num">${i}.</span>
                    <input type="text" class="aluno-input" placeholder="Nome Completo" value="${val}">
                </div>`;
        }
    }

    async function verificarExistente() {
        const escola = document.getElementById('escola').value;
        const turma = document.getElementById('turma').value;
        const msg = document.getElementById('msg-status');

        if(escola && turma) {
            try {
                const res = await fetch(`/buscar?escola=${encodeURIComponent(escola)}&turma=${encodeURIComponent(turma)}`);
                const data = await res.json();
                
                if(data.encontrado) {
                    dadosCarregados = data.dados;
                    msg.innerHTML = "<b style='color: var(--success-green)'>🟢 Turma encontrada!</b> Você pode editar os dados.";
                    // Preenche campos automaticamente
                    document.getElementById('email-user').value = data.dados.email.split('@')[0];
                    document.getElementById('ano').value = data.dados.ano;
                    document.getElementsByName('turno').forEach(r => { if(r.value == data.dados.turno) r.checked = true; });
                } else {
                    dadosCarregados = null;
                    msg.innerHTML = "<b style='color: #888'>⚪ Nova turma para esta unidade.</b>";
                }
            } catch (e) { console.error("Erro na busca", e); }
        }
    }

    async function finalizar() {
        const alunos = Array.from(document.querySelectorAll('.aluno-input')).map(i => i.value.trim());
        const payload = {
            escola: document.getElementById('escola').value,
            ano: document.getElementById('ano').value,
            email: document.getElementById('email-user').value.trim() + "@queimados.rj.gov.br",
            turma: document.getElementById('turma').value.trim(),
            turno: document.querySelector('input[name="turno"]:checked')?.value || "",
            alunos: alunos
        };

        try {
            const response = await fetch('/salvar', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });

            if(response.ok) {
                const modal = document.getElementById('success-modal');
                modal.classList.remove('hidden');
                setTimeout(() => {
                    modal.classList.add('fade-out');
                    setTimeout(() => location.reload(), 1000);
                }, 5000); // 5 segundos de exibição como solicitado
            }
        } catch (error) {
            alert("Erro ao enviar dados. Verifique a conexão.");
        }
    }
</script>
</body>
</html>
