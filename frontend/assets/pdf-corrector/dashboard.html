<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8"><title>GCR Enterprise - Dashboard</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>
    <header class="top-bar"><div class="header-title"><b>GCR - DASHBOARD ANALYTICS</b></div></header>
    <div class="container">
        <aside class="sidebar">
            <button class="nav-btn" onclick="showSection('gerar')"><i class="fa-solid fa-plus"></i><span>GERAR</span></button>
            <button class="nav-btn" onclick="showSection('importar')"><i class="fa-solid fa-upload"></i><span>IMPORTAR</span></button>
            <button class="nav-btn active" onclick="showSection('dash')"><i class="fa-solid fa-chart-pie"></i><span>DASHBOARD</span></button>
        </aside>
        <main class="content">
            <section id="section-gerar">
                <h2>Novo Gabarito</h2>
                <div class="card">
                    <input type="text" id="tit-prova" placeholder="Título da Prova">
                    <div id="blocos-container"><div class="bloco-item"><input type="text" placeholder="Matéria" class="bl-nome"><input type="number" placeholder="Qtd" class="bl-qtd"></div></div>
                    <button class="btn-small" onclick="addBloco()">+ Bloco</button>
                    <button class="btn-primary" onclick="processarGeracao()">GERAR PDF</button>
                </div>
            </section>
            
            <section id="section-importar">
                <h2>Importar Digitalizações</h2>
                <div class="card drag-area"><input type="file" id="file-provas" hidden><button class="btn-primary" onclick="document.getElementById('file-provas').click()">SUBIR PDF</button><div id="status-import"></div></div>
            </section>

            <section id="section-dash" class="active">
                <h2>Dashboard de Resultados</h2>
                <div class="card" style="margin-bottom: 20px;">
                    <label>Selecionar Prova:</label>
                    <select id="select-prova" onchange="carregarDadosDash()"><option value="">Carregando...</option></select>
                    <button class="btn-small" onclick="baixarRelatorioPDF()" style="float: right;">BAIXAR RELATÓRIO A4</button>
                </div>
                <div class="grid-stats" id="stats-summary">
                    <div class="stat-box"><h3>Media Turma</h3><p id="media-turma">-</p></div>
                    <div class="stat-box"><h3>Total Alunos</h3><p id="total-alunos">-</p></div>
                </div>
                <div class="card">
                    <table class="rel-table"><thead><tr><th>Aluno</th><th>Acertos</th><th>Brancos</th><th>Nota</th></tr></thead><tbody id="lista-alunos"></tbody></table>
                </div>
            </section>
        </main>
    </div>
    <script src="script.js"></script>
</body>
</html>
