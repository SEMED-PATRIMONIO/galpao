<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GCR - Gerador de Cartão-Resposta</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>
    <header class="top-bar">
        <img src="logap.png" alt="Logap" class="logo-img" onerror="this.style.display='none'">
        <div class="header-title"><b>GCR - GERADOR DE CARTÃO-RESPOSTA</b></div>
    </header>

    <div class="container">
        <aside class="sidebar">
            <button class="nav-btn active" onclick="showSection('gerar')">
                <i class="fa-solid fa-file-circle-plus"></i>
                <span>GERAR GABARITO</span>
            </button>
            <button class="nav-btn" onclick="showSection('importar')">
                <i class="fa-solid fa-file-import"></i>
                <span>IMPORTAR RESPOSTAS</span>
            </button>
            <button class="nav-btn" onclick="showSection('relatorios')">
                <i class="fa-solid fa-chart-line"></i>
                <span>RELATÓRIOS</span>
            </button>
        </aside>

        <main class="content">
            <!-- Seção Gerar -->
            <section id="section-gerar" class="active">
                <h2>Configurar Novo Gabarito</h2>
                <div class="card">
                    <label>Título do Cartão:</label>
                    <input type="text" id="tit-prova" placeholder="Ex: SIMULADO 01 - SEMED" value="CARTÃO-RESPOSTA">

                    <div id="blocos-container">
                        <div class="bloco-item">
                            <input type="text" placeholder="Matéria" class="bl-nome" value="Língua Portuguesa">
                            <input type="number" placeholder="Qtd Questões" class="bl-qtd" value="20">
                            <select class="bl-alt">
                                <option value="4">4 Alternativas (A-D)</option>
                                <option value="5">5 Alternativas (A-E)</option>
                            </select>
                        </div>
                    </div>
                    
                    <button class="btn-small" onclick="addBloco()">+ Adicionar Bloco</button>
                    <hr>
                    <button class="btn-primary" onclick="abrirConfiguracaoGabarito()">PRÓXIMO: DEFINIR RESPOSTAS CORRETAS</button>
                </div>
            </section>

            <div id="modal-gabarito" class="modal" style="display:none;">
                <div class="modal-content">
                    <h3>Definir Respostas Corretas (Gabarito)</h3>
                    <div id="lista-questoes-gabarito"></div>
                    <button class="btn-primary" onclick="processarGeracaoFinal()">FINALIZAR E GERAR PDF</button>
                    <button class="btn-small" onclick="fecharModal()">CANCELAR</button>
                </div>
            </div>

            <!-- Seção Importar -->
            <section id="section-importar">
                <h2>Importar Provas Escaneadas</h2>
                <div class="card drag-area" id="drop-zone">
                    <i class="fa-solid fa-cloud-arrow-up"></i>
                    <p>Arraste o PDF das provas aqui ou clique para selecionar</p>
                    <input type="file" id="file-provas" hidden accept="application/pdf">
                    <button class="btn-primary" onclick="document.getElementById('file-provas').click()">SELECIONAR ARQUIVO</button>
                </div>
                <div id="status-import"></div>
            </section>

            <!-- Seção Relatórios -->
            <section id="section-relatorios">
                <h2>Análise de Desempenho</h2>
                <div id="lista-relatorios">
                    <p>Nenhum dado processado ainda.</p>
                </div>
            </section>
        </main>
    </div>
    <script src="script.js"></script>
</body>
</html>
