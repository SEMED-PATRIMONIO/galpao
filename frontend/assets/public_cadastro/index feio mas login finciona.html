<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema AEE - Cadastro</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .d-none { display: none !important; }
        body { background: #f4f7f6; }
    </style>
</head>
<body>

    <div id="view-login" class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-4 card p-4 shadow">
                <h3 class="text-center">AEE Login</h3>
                <input type="text" id="campo-login" class="form-control my-2" placeholder="Usuário">
                <input type="password" id="campo-senha" class="form-control my-2" placeholder="Senha">
                <button onclick="fazerLogin()" class="btn btn-primary w-100">Entrar</button>
            </div>
        </div>
    </div>

    <div id="view-menu" class="container-fluid d-none">
        <nav class="navbar navbar-dark bg-dark p-3 mb-4">
            <span class="navbar-brand">Sistema AEE</span>
            <span class="text-white">Olá, <b id="nome-tecnico-logado"></b></span>
            <button onclick="logout()" class="btn btn-outline-light btn-sm">Sair</button>
        </nav>

        <div class="container">
            <div class="d-flex justify-content-between mb-3">
                <h4>Alunos Cadastrados</h4>
                <button class="btn btn-success" onclick="alert('Funcionalidade de cadastro aqui')">+ Novo Aluno</button>
            </div>
            <table class="table table-striped table-hover shadow-sm bg-white">
                <thead class="table-dark">
                    <tr><th>RA</th><th>Nome Completo</th><th>Escola</th></tr>
                </thead>
                <tbody id="tabela-corpo">
                    </tbody>
            </table>
        </div>
    </div>

    <script>
        // 1. Definição da função (Mata o erro 'ReferenceError')
        function mostrarView(viewId) {
            document.getElementById('view-login').classList.add('d-none');
            document.getElementById('view-menu').classList.add('d-none');
            
            const target = document.getElementById(viewId);
            if (target) {
                target.classList.remove('d-none');
            } else {
                console.error("View não encontrada:", viewId);
            }
        }

        // 2. Lógica de Login
        async function fazerLogin() {
            const login = document.getElementById('campo-login').value;
            const senha = document.getElementById('campo-senha').value;

            try {
                const res = await fetch('/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ login, senha })
                });

                const dados = await res.json();

                if (res.ok) {
                    localStorage.setItem('token', dados.token);
                    localStorage.setItem('userNome', dados.user.nome);
                    
                    document.getElementById('nome-tecnico-logado').innerText = dados.user.nome;
                    mostrarView('view-menu');
                    carregarDados();
                } else {
                    alert(dados.error || "Erro ao logar");
                }
            } catch (err) {
                alert("Erro ao conectar com o servidor.");
            }
        }

        // 3. Carregar Tabela
        async function carregarDados() {
            const token = localStorage.getItem('token');
            const corpo = document.getElementById('tabela-corpo');

            try {
                const res = await fetch('/api/alunos/listar', {
                    headers: { 'Authorization': `Bearer ${token}` }
                });

                if (!res.ok) {
                    logout();
                    return;
                }

                const alunos = await res.json();
                corpo.innerHTML = alunos.map(a => `
                    <tr>
                        <td>${a.ra}</td>
                        <td>${a.nome_completo}</td>
                        <td>${a.escola}</td>
                    </tr>
                `).join('');
            } catch (err) {
                console.error("Erro ao carregar dados:", err);
            }
        }

        function logout() {
            localStorage.clear();
            location.reload();
        }

        // 4. O que acontece ao abrir a página
        window.onload = () => {
            const token = localStorage.getItem('token');
            const userNome = localStorage.getItem('userNome');

            // Verifica se o token é válido e não é a string "undefined"
            if (!token || token === "undefined" || !userNome) {
                localStorage.clear();
                mostrarView('view-login');
            } else {
                document.getElementById('nome-tecnico-logado').innerText = userNome;
                mostrarView('view-menu');
                carregarDados();
            }
        };
    </script>
</body>
</html>
