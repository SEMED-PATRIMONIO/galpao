<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Portal da Família - AEE</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: linear-gradient(135deg, #00264d, #004587); min-height: 100vh; color: white; }
        .glass-card { background: rgba(255, 255, 255, 0.15); backdrop-filter: blur(10px); border-radius: 20px; border: 1px solid rgba(255,255,255,0.2); }
        .d-none { display: none !important; }
    </style>
</head>
<body class="p-4">

    <div id="view-login" class="container text-center mt-5">
        <div class="glass-card p-5 mx-auto" style="max-width: 400px;">
            <h3>Acesso Família</h3>
            <p>Digite seu token de 5 dígitos</p>
            <input type="text" id="token-input" class="form-control mb-3 text-center fw-bold" maxlength="5">
            <button onclick="loginPais()" class="btn btn-light w-100">Acessar</button>
        </div>
    </div>

    <div id="view-troca-senha" class="container d-none mt-5">
        <div class="glass-card p-5 mx-auto" style="max-width: 450px;">
            <h4 class="text-warning">Segurança Obrigatória</h4>
            <p>Como este é seu primeiro acesso, você deve criar uma senha pessoal para proteger os dados médicos do seu filho.</p>
            <input type="password" id="nova-senha" class="form-control mb-2" placeholder="Nova Senha">
            <input type="password" id="confirma-senha" class="form-control mb-3" placeholder="Confirme a Senha">
            <button onclick="definirSenha()" class="btn btn-warning w-100">Salvar e Liberar Acesso</button>
        </div>
    </div>

    <div id="view-dashboard" class="container d-none">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2>Olá, <span id="nome-pai"></span></h2>
            <button onclick="logout()" class="btn btn-outline-danger btn-sm">Sair</button>
        </div>
        
        <div class="glass-card p-4">
            <h4>Próximas Consultas e Registros Médicos</h4>
            <div id="lista-consultas" class="mt-3">
                </div>
        </div>
    </div>

    <script>
        async function loginPais() {
            const token = document.getElementById('token-input').value;
            const res = await fetch('/api/login-pais', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ token_acesso: token })
            });
            const dados = await res.json();

            if (res.ok) {
                localStorage.setItem('token_pais', dados.token);
                if (dados.precisaTrocar) {
                    mostrar('view-troca-senha');
                } else {
                    carregarDadosFilho();
                }
            } else { alert("Token inválido"); }
        }

        async function definirSenha() {
            const novaSenha = document.getElementById('nova-senha').value;
            const token = localStorage.getItem('token_pais');
            
            const res = await fetch('/api/definir-senha', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
                body: JSON.stringify({ novaSenha })
            });

            if (res.ok) {
                alert("Senha definida! Agora você tem acesso total.");
                carregarDadosFilho();
            }
        }

        async function carregarDadosFilho() {
            const token = localStorage.getItem('token_pais');
            const res = await fetch('/api/meu-filho/consultas', {
                headers: { 'Authorization': `Bearer ${token}` }
            });
            const consultas = await res.json();
            
            document.getElementById('lista-consultas').innerHTML = consultas.map(c => `
                <div class="border-bottom border-secondary py-3">
                    <div class="d-flex justify-content-between">
                        <span class="fw-bold">${new Date(c.data_hora).toLocaleString()}</span>
                        <span class="badge bg-info">${c.status}</span>
                    </div>
                    <p class="mt-2 small text-info">Obs. Médica: ${c.observacoes_medicas || 'Nenhuma observação registrada.'}</p>
                </div>
            `).join('');
            mostrar('view-dashboard');
        }

        function mostrar(id) {
            document.querySelectorAll('.container').forEach(c => c.classList.add('d-none'));
            document.getElementById(id).classList.remove('d-none');
        }

        function logout() { localStorage.clear(); location.reload(); }
    </script>
</body>
</html>
