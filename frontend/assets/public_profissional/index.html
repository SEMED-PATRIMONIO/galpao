<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AEE - Portal Saúde</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <style> /* ... (Estilos de vidro azul e branco) ... */ </style>
</head>
<body>
    <div id="view-login" class="glass-card">
        <h3>Acesso Profissional</h3>
        <input type="text" id="l-user" class="form-control" placeholder="Login">
        <input type="password" id="l-pass" class="form-control" placeholder="Senha">
        <button class="btn-acao" onclick="login()">Entrar</button>
    </div>
    <div id="view-troca-senha" class="glass-card hidden">
        <div style="text-align: center; margin-bottom: 20px;">
            <i class="bi bi-shield-lock-fill" style="font-size: 3rem; color: #004587;"></i>
            <h3>Segurança Obrigatória</h3>
            <p>Este é o seu primeiro acesso. Por favor, crie uma senha segura de sua preferência.</p>
        </div>

        <div class="form-group">
            <label>Nova Senha</label>
            <input type="password" id="p-nova-senha" class="form-control" placeholder="Mínimo 6 caracteres">
        </div>
        <div class="form-group">
            <label>Confirme a Nova Senha</label>
            <input type="password" id="p-confirma-senha" class="form-control">
        </div>

        <button class="btn-acao" onclick="executarTrocaSenha()">Definir Senha e Acessar</button>
    </div>
    <div id="view-main" class="hidden">
        <div class="header">
            <h4 id="nome-p">Dr(a). --</h4>
            <span class="badge bg-light text-primary" id="esp-p">--</span>
        </div>
        
        <div class="menu-grid">
            <button class="menu-btn" onclick="mostrarAlunos()">
                <i class="bi bi-people"></i> Meus Alunos
            </button>
            <button class="menu-btn" onclick="abrirAgenda()">
                <i class="bi bi-calendar-event"></i> Agendar
            </button>
        </div>
    </div>

    <div id="view-agendar" class="glass-card hidden">
        <h4>Novo Agendamento</h4>
        <select id="sel-aluno" class="form-control"></select>
        <input type="datetime-local" id="data-agenda" class="form-control">
        <textarea id="obs-agenda" class="form-control" placeholder="Observações/Orientações"></textarea>
        <button class="btn-acao" onclick="salvarAgenda()">Confirmar Agendamento</button>
        <button onclick="voltar()" class="btn-acao" style="background:none; color:#666;">Voltar</button>
    </div>
    <button class="menu-btn" onclick="abrirFormAtendimento()" style="background: #e3f2fd; border: 2px solid var(--blue);">
        <i class="bi bi-pills"></i> Realizar Atendimento
    </button>

    <div id="view-atendimento" class="glass-card hidden">
        <h4><i class="bi bi-person-check"></i> Atendimento Clínico</h4>
        
        <label>Selecionar Aluno</label>
        <select id="atend-aluno" class="form-control"></select>

        <label>Status</label>
        <select id="atend-status" class="form-control">
            <option value="Presente">Presente</option>
            <option value="Falta Aluno">Falta Aluno</option>
        </select>

        <label>Evolução (Pública - Todos veem)</label>
        <textarea id="atend-publico" class="form-control" placeholder="Resumo simples da sessão..."></textarea>

        <div style="background: #fff3cd; padding: 10px; border-radius: 10px; border: 1px solid #ffeeba; margin-top: 10px;">
            <label><i class="bi bi-eye-slash-fill"></i> <b>Observação Clínica (Privada)</b></label>
            <p class="small text-muted">Apenas você e o pai/mãe podem ler isto. O Gestor e o TI não têm acesso.</p>
            <textarea id="atend-privado" class="form-control" rows="4" placeholder="Detalhes técnicos, orientações sigilosas..."></textarea>
        </div>
        <div class="form-group mb-3">
            <label><i class="bi bi-camera"></i> Anexar Evidência (Foto ou PDF)</label>
            <input type="file" id="f-evidencia" class="form-control" accept="image/*,.pdf">
            <div id="upload-status" class="small text-muted mt-1"></div>
        </div>

        <button class="btn-acao" onclick="salvarAtendimentoSaude()">Gravar Atendimento</button>
        <button onclick="voltar()" class="btn-acao" style="background:none; color:#666;">Cancelar</button>
    </div>    
</body>
<script>
    let profLogado = null;
    async function login() {
        const login = document.getElementById('l-user').value;
        const senha = document.getElementById('l-pass').value;

        const res = await fetch('/api/login-profissional', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ login, senha })
        });

        if (res.ok) {
            const data = await res.json();
            profLogado = data.user;

            // VERIFICAÇÃO DE PRIMEIRO ACESSO
            if (profLogado.primeiro_acesso) {
                mostrarView('view-troca-senha');
            } else {
                entrarNoDashboard();
            }
        } else {
            alert("Credenciais inválidas ou acesso inativo.");
        }
    }

    async function executarTrocaSenha() {
        const nova = document.getElementById('p-nova-senha').value;
        const confirma = document.getElementById('p-confirma-senha').value;

        if (nova.length < 6) return alert("A senha deve ter pelo menos 6 caracteres.");
        if (nova !== confirma) return alert("As senhas não coincidem.");

        const res = await fetch('/api/profissional/alterar-senha', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ id: profLogado.id, nova_senha: nova })
        });

        if (res.ok) {
            alert("Senha configurada com sucesso! Bem-vindo.");
            entrarNoDashboard();
        }
    }

    function entrarNoDashboard() {
        document.getElementById('nome-p').innerText = "Dr(a). " + profLogado.nome;
        document.getElementById('esp-p').innerText = profLogado.nome_especialidade;
        mostrarView('view-main');
    }

    function mostrarView(id) {
        document.querySelectorAll('.glass-card, #view-main').forEach(v => v.classList.add('hidden'));
        document.getElementById(id).classList.remove('hidden');
    }

    async function gravarSessao() {
        const fileInput = document.getElementById('f-evidencia');
        let evidenciaUrl = null;

        // Se houver arquivo, faz o upload primeiro
        if (fileInput.files.length > 0) {
            document.getElementById('upload-status').innerText = "Enviando arquivo...";
            const formData = new FormData();
            formData.append('arquivo', fileInput.files[0]);

            const resUpload = await fetch('/api/upload-evidencia', {
                method: 'POST',
                body: formData
            });
            const dataUpload = await resUpload.json();
            evidenciaUrl = dataUpload.url;
        }

        // Agora salva o atendimento com a URL da evidência
        const dadosAtendimento = {
            aluno_id: document.getElementById('f-aluno-id').value,
            // ... outros campos (status, evolucao) ...
            evidencia_url: evidenciaUrl // Salva o caminho no banco de dados
        };

        const res = await fetch('/api/lancar-atendimento', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(dadosAtendimento)
        });

        if (res.ok) alert("Atendimento e evidência salvos!");
    }    

</script>
</html>
