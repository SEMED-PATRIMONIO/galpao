<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AEE - Portal Especialista</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <style>
        :root { 
            --primary-blue: #004587; 
            --secondary-blue: #00a8e8; 
            --glass: rgba(255, 255, 255, 0.9); 
        }
        body { 
            background: linear-gradient(135deg, #e0f2ff 0%, #ffffff 100%);
            min-height: 100vh; font-family: 'Segoe UI', system-ui, sans-serif;
        }
        .glass-card {
            background: var(--glass); backdrop-filter: blur(10px); border-radius: 20px;
            border: 1px solid rgba(255,255,255,0.4); box-shadow: 0 10px 30px rgba(0,0,0,0.08);
            padding: 30px;
        }
        .agenda-item {
            border-left: 5px solid var(--secondary-blue);
            background: white; border-radius: 12px;
            padding: 15px; margin-bottom: 10px; transition: 0.3s;
        }
        .agenda-item:hover { transform: translateX(5px); box-shadow: 0 5px 15px rgba(0,0,0,0.05); }
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div class="container py-4">
        <div id="view-main" class="glass-card">
            <div class="d-flex justify-content-between align-items-center mb-4">
                <div>
                    <h2 class="fw-bold text-primary mb-0">Olá, <span id="nome-prof">Especialista</span></h2>
                    <p class="text-muted">Sua agenda de hoje e comunicações</p>
                </div>
                <button class="btn btn-outline-danger btn-sm" onclick="sair()">Sair</button>
            </div>

            <div class="row g-4">
                <div class="col-md-7">
                    <div class="d-flex justify-content-between align-items-center mb-3">
                        <h5 class="fw-bold"><i class="bi bi-calendar-event"></i> Próximos Atendimentos</h5>
                        <button class="btn btn-primary btn-sm" onclick="abrirModalAgendamento()">+ Agendar</button>
                    </div>
                    <div id="lista-agenda">
                        </div>
                </div>

                <div class="col-md-5">
                    <h5 class="fw-bold"><i class="bi bi-chat-dots"></i> Recados dos Pais</h5>
                    <div id="lista-mensagens" class="p-3 bg-white rounded-4" style="height: 300px; overflow-y: auto; border: 1px solid #eee;">
                        <small class="text-muted text-center d-block">Nenhuma mensagem recente.</small>
                    </div>
                    <button class="btn btn-secondary w-100 mt-2" onclick="mostrarView('view-comunicacao')">Nova Mensagem</button>
                </div>
            </div>
        </div>

        <div id="view-atendimento" class="glass-card hidden">
            <button class="btn btn-link p-0 mb-3 text-decoration-none" onclick="mostrarView('view-main')">
                <i class="bi bi-arrow-left"></i> Voltar à agenda
            </button>
            <h4>Lançar Evolução: <span id="atend-nome-aluno" class="text-primary">--</span></h4>
            
            <div class="mb-3">
                <label class="form-label fw-bold">Evolução (Visível para os Pais)</label>
                <textarea id="atend-publico" class="form-control" rows="4" placeholder="Descreva como foi o atendimento hoje..."></textarea>
            </div>
            
            <div class="mb-3">
                <label class="form-label fw-bold">Observações Clínicas (Privado)</label>
                <textarea id="atend-privado" class="form-control" rows="2" placeholder="Notas internas para a equipe médica..."></textarea>
            </div>

            <div class="mb-4">
                <label class="form-label fw-bold">Evidência (Opcional)</label>
                <input type="file" id="f-evidencia" class="form-control">
            </div>

            <button class="btn btn-primary w-100 py-2 fw-bold" onclick="salvarAtendimento()">Finalizar e Notificar Pais</button>
        </div>
    </div>

    <div class="modal fade" id="modalAgendamento" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content" style="border-radius: 20px;">
                <div class="modal-header border-0">
                    <h5 class="modal-title fw-bold">Novo Agendamento</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <label>Aluno</label>
                    <select id="agend-aluno" class="form-select mb-3"></select>
                    
                    <label>Data e Hora</label>
                    <input type="datetime-local" id="agend-data" class="form-control mb-3">
                    
                    <label>Observações</label>
                    <textarea id="agend-obs" class="form-control" rows="2"></textarea>
                </div>
                <div class="modal-footer border-0">
                    <button type="button" class="btn btn-primary w-100" onclick="salvarNovoAgendamento()">Confirmar Horário</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        const token = localStorage.getItem('token');
        const prof = JSON.parse(localStorage.getItem('usuario'));
        let listaAlunos = [];

        async function carregarAgenda() {
            const res = await fetch('/api/agenda/profissional', {
                headers: { 'Authorization': `Bearer ${token}` }
            });
            const dados = await res.json();
            const lista = document.getElementById('lista-agenda');
            
            lista.innerHTML = dados.map(item => `
                <div class="card-atendimento d-flex justify-content-between align-items-center p-3 mb-2 shadow-sm bg-white rounded">
                    <div>
                        <strong class="d-block">${item.aluno_nome}</strong>
                        <small class="text-muted"><i class="bi bi-clock"></i> ${new Date(item.data_hora).toLocaleString()}</small>
                    </div>
                    <button class="btn btn-sm btn-primary" onclick="abrirModalAtendimento(${item.aluno_id}, '${item.aluno_nome}')">
                        Atender agora
                    </button>
                </div>
            `).join('');
        }

        let alunoSelecionadoId = null;

        function abrirModalAtendimento(id, nome) {
            alunoSelecionadoId = id;
            document.getElementById('modal-aluno-nome').innerText = nome;
            new bootstrap.Modal(document.getElementById('modalAtendimento')).show();
        }

        async function finalizarAtendimento() {
            const payload = {
                aluno_id: alunoSelecionadoId,
                evolucao: document.getElementById('f-evolucao').value,
                observacao_clinica: document.getElementById('f-obs-interna').value
            };

            const res = await fetch('/api/v2/profissional/atender', {
                method: 'POST',
                headers: { 
                    'Content-Type': 'application/json',
                    'Authorization': `Bearer ${token}` 
                },
                body: JSON.stringify(payload)
            });

            if(res.ok) {
                alert("Atendimento registrado!");
                location.reload();
            } else {
                alert("Erro ao salvar.");
            }
        }

        async function carregarAlunos() {
            const token = localStorage.getItem('aee_token');
            try {
                const res = await fetch('/api/v2/profissional/meus-alunos', {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                listaAlunos = await res.json();
                
                const select = document.getElementById('select-aluno-agendamento');
                select.innerHTML = '<option value="">Selecione o Aluno...</option>' + 
                    listaAlunos.map(a => `<option value="${a.id}">${a.nome_completo} (RA: ${a.ra})</option>`).join('');
            } catch (err) {
                console.error("Erro ao carregar alunos");
            }
        }

        async function salvarAgendamento() {
            const token = localStorage.getItem('aee_token');
            const payload = {
                aluno_id: document.getElementById('select-aluno-agendamento').value,
                data_hora: document.getElementById('data-agendamento').value,
                observacoes: document.getElementById('obs-agendamento').value
            };

            if (!payload.aluno_id || !payload.data_hora) {
                return alert("Selecione o aluno e a data/hora.");
            }
            try {
                const res = await fetch('/api/v2/profissional/agendar', {
                    method: 'POST',
                    headers: { 
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}` 
                    },
                    body: JSON.stringify(payload)
                });

                if (res.ok) {
                    alert("Agendamento realizado! O pai receberá um alerta no portal.");
                    bootstrap.Modal.getInstance(document.getElementById('modalAgendamento')).hide();
                    carregarAgenda(); // Atualiza a lista de compromissos do profissional
                }
            } catch (err) {
                alert("Erro ao salvar agendamento.");
            }
        }

        
        window.onload = () => {
            if(!token) window.location.href = 'login.html';
            document.getElementById('nome-prof').innerText = prof.nome;
            carregarAgenda();
        };
    </script>
</body>
</html>
